  {q: "I sensori ottici live-scan per impronte digitali utilizzano principalmente il principio della:", opts: ["Fluorescenza indotta da raggi ultravioletti sulla cheratina delle creste papillari per rivelarne il pattern superficiale visibile", "Misura capacitiva puntuale delle variazioni di potenziale elettrico tra le creste e i solchi del polpastrello a contatto", "Triangolazione laser con proiezione di lama di luce strutturata per ricostruire la superficie tridimensionale del dito", "Frustrated Total Internal Reflection (FTIR), dove le creste a contatto col prisma modificano la riflessione interna della luce"], ans: 3, expl: "FTIR: le creste a contatto col prisma 'frustrano' la riflessione totale interna → appaiono scure. I solchi non toccano → la luce si riflette → appaiono chiari.", cat: "IMPR"},
  {q: "I sensori a stato solido (capacitivi) per impronte rilevano le creste perché:", opts: ["Le creste riflettono la luce infrarossa in modo diverso rispetto ai solchi sul substrato di vetro del sensore biometrico", "Le creste generano un segnale piezoelettrico proporzionale alla pressione meccanica esercitata sulla superficie del sensore", "Il contatto fra il ridge e la superficie del sensore modifica la capacità del circuito di ogni singolo pixel", "Le creste assorbono gli ultrasuoni in modo differenziato rispetto ai solchi creando un'eco misurabile e distinta per pixel"], ans: 2, expl: "Ogni pixel è un condensatore. Le creste a contatto modificano la capacità di quel pixel; i solchi non toccano → nessuna variazione. Il pattern di capacità = immagine dell'impronta.", cat: "IMPR"},
  {q: "I sensori a ultrasuoni per impronte (come Qualcomm Snapdragon Sense ID) offrono rispetto ai capacitivi:", opts: ["Un costo inferiore, una risoluzione più bassa ma una maggiore velocità di acquisizione su superfici asciutte e pulite", "Una migliore capacità anti-spoofing e la rilevazione della tridimensionalità degli strati cutanei sottostanti al derma", "La possibilità di funzionare esclusivamente in ambienti privi di umidità e polvere per garantire massima accuratezza", "Un consumo energetico maggiore ma una compatibilità nativa con tutti i formati di interscambio ISO/IEC 19794 biometrici"], ans: 1, expl: "Gli ultrasuoni penetrano sotto la pelle → rilevano la struttura 3D subcutanea → difficile da falsificare con diti artificiali. Funzionano anche con dita umide o sporche.", cat: "IMPR"},
  {q: "I paradigmi di matching delle impronte digitali si suddividono principalmente in:", opts: ["Manuale, basato su immagine (correlazione), basato su texture/ridge (filterbank) e basato su minutiae", "Statistico (bayesiano), neurale (deep learning), geometrico (triangolazione) e basato su pori del livello III", "Basato su DNA, basato su minutiae, basato su pori del livello III e basato su creste interdigitali del palmo", "Supervisionato con label, non supervisionato senza label, semi-supervisionato e per rinforzo (reinforcement learning)"], ans: 0, expl: "Quattro paradigmi: manuale (esperto forense), image-based (correlazione diretta), texture-based (filterbank come Gabor), minutiae-based (il più diffuso negli AFIS).", cat: "IMPR"},
  {q: "Il matching basato su filterbank (texture-based) per le impronte presenta come vantaggio principale:", opts: ["L'invarianza totale a traslazione, rotazione e qualsiasi distorsione non lineare del campione acquisito dal sensore", "L'assenza completa di necessità di allineamento preliminare tra le due impronte da confrontare nel processo di matching", "L'accuratezza superiore a qualsiasi metodo basato su minutiae in tutte le condizioni operative reali del sistema biometrico", "L'utilizzo dell'informazione di texture persa nei metodi a minutiae e buone prestazioni con impronte di bassa qualità"], ans: 3, expl: "I filterbank (es. Gabor) catturano la texture delle creste che va persa nella binarizzazione/thinning per le minutiae. Efficaci con impronte di bassa qualità.", cat: "IMPR"},
  {q: "Il processo ACE-V seguito dagli esperti forensi per le impronte digitali prevede le fasi di:", opts: ["Acquisition, Calibration, Extraction, Verification: acquisizione, calibrazione sensore, estrazione minutiae e verifica finale", "Analysis, Comparison, Evaluation, Verification: analisi, confronto sistematico, valutazione e verifica da esperto indipendente", "Assessment, Classification, Encoding, Validation: valutazione qualità, classificazione, codifica template e validazione sistema", "Alignment, Correlation, Evaluation, Visualization: allineamento, correlazione statistica, valutazione score e visualizzazione"], ans: 1, expl: "ACE-V: Analysis (analisi mark), Comparison (confronto con impronta di riferimento), Evaluation (identità/esclusione/inconcluso), Verification (revisione da esperto indipendente).", cat: "IMPR"},
  {q: "Nell'esperimento didattico di Matsumoto, un dito artificiale in gelatina alimentare è stato creato:", opts: ["Stampando l'impronta con stampante 3D in resina ad alta risoluzione e rivestendo poi il risultato con silicone biocompatibile", "Acquisendo l'impronta con scanner 3D e fabbricando una replica accurata con cera d'api e lattice naturale vulcanizzato", "Fotografando l'impronta con camera macro, stampandola su acetato trasparente e trasferendola su gomma termica speciale", "Creando uno stampo con plastica deformabile al calore, poi versandovi gelatina alimentare sciolta in acqua bollente"], ans: 3, expl: "Matsumoto: plastica termoformabile premuta sul dito → stampo → gelatina alimentare versata → dito finto. Tecnica a basso costo che inganna molti sensori ottici e capacitivi.", cat: "IMPR"},
  {q: "Lo standard di compressione WSQ (Wavelet Scalar Quantization) è stato sviluppato da FBI e NIST per:", opts: ["Le immagini del volto nei passaporti elettronici conformi allo standard ICAO Doc 9303 per i documenti di viaggio biometrici", "Le immagini dell'iride nelle banche dati nazionali dei tratti biometrici oculari per uso governativo e forense", "Le immagini delle impronte digitali in scala di grigi negli archivi di grandi dimensioni come AFIS e ABIS nazionali", "Le immagini delle vene palmari nei sistemi di accesso contactless di ultima generazione per uso commerciale diffuso"], ans: 2, expl: "WSQ: standard FBI/NIST specifico per impronte in scala di grigi. Ottimizzato per le frequenze spaziali delle creste papillari, ratio ~15:1 senza perdita visibile.", cat: "IMPR"},
  {q: "La competizione FVC-onGoing (Fingerprint Verification Competition) è significativa perché:", opts: ["Confronta esclusivamente algoritmi di classificazione automatica a livello I delle impronte (arch, loop, whorl) su database fissi", "È l'unica competizione che valuta la qualità dei sensori hardware senza testare gli algoritmi software di verifica e matching", "Fornisce una valutazione indipendente e continuativa di algoritmi di fingerprint matching su benchmark pubblici standardizzati", "Si limita a valutare la velocità computazionale del matching senza considerare l'accuratezza complessiva del sistema biometrico"], ans: 2, expl: "FVC-onGoing: valutazione online continua (non periodica a cadenza fissa) di algoritmi di verifica e identificazione su impronte, con ranking aggiornato in tempo reale.", cat: "IMPR"},
  {q: "Il metodo delle Eigenfingers nella biometria della mano funziona in modo:", opts: ["Completamente diverso dalle autofacce: usa la trasformata di Fourier anziché la PCA sulle immagini delle dita", "Assolutamente simile al metodo delle autofacce: da un database di immagini di mani si ricostruiscono le dita con PCA", "Opposto alle autofacce: minimizza la varianza globale anziché massimizzarla nella proiezione delle immagini della mano", "Identico alla LDA: sfrutta le etichette degli individui per la classificazione supervisionata delle immagini delle dita"], ans: 1, expl: "Il MD cita: 'In un modo assolutamente simile al metodo della autofacce, da un database di immagini di mani è possibile ricostruire le dita ed il palmo mediante Eigenfinger.'", cat: "TATTO"},
  {q: "Il sistema contactless Amazon One per il riconoscimento biometrico si basa su:", opts: ["La geometria tridimensionale della mano acquisita con scanner laser a lama di luce strutturata senza contatto fisico", "Il pattern delle vene del dorso della mano rilevato con sensore NIR ad alta risoluzione senza contatto fisico diretto", "Il riconoscimento del palmo (palmprint) in versione contactless senza contatto fisico con il sensore del terminale", "L'analisi delle impronte delle cinque dita acquisite simultaneamente con sensore ottico FTIR senza contatto fisico diretto"], ans: 2, expl: "Amazon One: sistema contactless di palmprint recognition usato nei punti vendita Amazon Go. L'utente avvicina il palmo al sensore senza toccarlo.", cat: "TATTO"},
  {q: "Le iridi sintetiche vengono generate mediante algoritmi basati su Markov Random Fields iterativi per:", opts: ["Creare dataset di test senza compromettere la privacy di individui reali che non hanno dato il consenso esplicito", "Sostituire i template reali nei database nazionali per ragioni di sicurezza informatica e protezione dei dati biometrici", "Addestrare i sensori hardware a calibrarsi automaticamente su diversi pattern iridei durante la fase di produzione industriale", "Fornire agli utenti un'iride alternativa da usare in caso di compromissione dell'iride originale registrata nel sistema"], ans: 0, expl: "Le iridi sintetiche servono per creare dataset di valutazione senza coinvolgere persone reali → nessun problema di privacy, consenso o GDPR per la ricerca e i benchmark.", cat: "IRIDE"},
  {q: "Le permutazioni dell'IrisCode vengono usate come contromisura in caso di furto del template perché:", opts: ["Modificano l'aspetto fisico dell'iride rendendola irriconoscibile anche a occhio nudo e ai sistemi ottici di acquisizione", "Rendono il vecchio IrisCode rubato inservibile, e lo XOR per il matching non risente delle permutazioni applicate", "Comprimono l'IrisCode riducendo la dimensione del template da 2048 bit a 256 bit per la trasmissione sicura e cifrata", "Garantiscono che due IrisCode di persone diverse producano sempre una distanza di Hamming esattamente pari a 0.5"], ans: 1, expl: "Le permutazioni sono una forma di biometria cancellabile: riordinano i bit in modo noto solo al sistema. Il vecchio codice rubato diventa inutile; lo XOR funziona ugualmente.", cat: "IRIDE"},
  {q: "Il sistema Bertillon, introdotto nel 1882, si basava su misure antropometriche con l'ipotesi che:", opts: ["Le impronte digitali siano uniche per ogni individuo e non cambino nel corso della vita adulta", "Lo scheletro umano non si modifica dopo i 20 anni e ogni scheletro è sufficientemente diverso dagli altri", "Le misure del volto siano sufficientemente stabili da permettere il riconoscimento a distanza automatico", "Le dimensioni delle mani e dei piedi rimangano costanti dopo i 25 anni e variano significativamente tra individui"], ans: 1, expl: "Bertillon ipotizzava: (1) lo scheletro non cambia dopo i 20 anni, (2) ogni scheletro è diverso. Il sistema fu abbandonato dopo il caso West (1903) che ne dimostrò i limiti.", cat: "IDAUT"},
  {q: "Il caso West del 1903 fu determinante nella storia della biometria perché:", opts: ["Dimostrò che il sistema Bertillon era inaffidabile: due uomini avevano misure quasi identiche ma impronte diverse", "Provò che le impronte digitali possono cambiare nel tempo rendendo inaffidabile l'identificazione forense", "Evidenziò che il sistema di classificazione Henry era troppo complesso per essere applicato su larga scala", "Mostrò che le misure antropometriche sono più accurate delle impronte per l'identificazione criminale forense"], ans: 0, expl: "Will West e William West, due detenuti non imparentati, avevano misure Bertillon quasi identiche ma impronte digitali diverse → il caso dimostrò il fallimento del sistema Bertillon e accelerò l'adozione delle impronte.", cat: "IDAUT"},
  {q: "Il problema della 'proscription' nei sistemi biometrici indica che:", opts: ["I dati biometrici non possono essere cancellati una volta acquisiti perché il tratto fisico rimane immutato", "I sistemi biometrici non possono essere disattivati senza compromettere la sicurezza dell'intera infrastruttura", "I dati biometrici non dovrebbero essere usati per scopi diversi da quelli per cui l'utente ha dato il consenso", "I template biometrici non possono essere trasferiti tra sistemi diversi per ragioni di incompatibilità tecnica"], ans: 2, expl: "Proscription: i dati biometrici non devono essere usati per scopi non dichiarati. Nei sistemi in rete è difficile assicurarlo perché la biometria è spesso interoperabile e prolunga l'intervallo di riconoscimento.", cat: "PRIV"},
  {q: "Secondo il GDPR, quando il trattamento di dati biometrici presenta rischi elevati per i diritti degli interessati, il titolare deve:", opts: ["Ottenere una certificazione ISO 30107 prima di avviare qualsiasi attività di trattamento dei dati biometrici", "Effettuare una Valutazione di Impatto sulla Protezione dei Dati (DPIA) prima di iniziare il trattamento", "Nominare obbligatoriamente un responsabile esterno indipendente per la supervisione dell'intero sistema biometrico", "Richiedere l'approvazione preventiva di un giudice competente prima di raccogliere qualsiasi dato biometrico"], ans: 1, expl: "GDPR: la DPIA (Data Protection Impact Assessment) è obbligatoria quando il trattamento può comportare rischi elevati, come nel caso dei dati biometrici usati per identificazione univoca.", cat: "PRIV"},
  {q: "Il Contrast Stretching applicato alle immagini di impronte digitali serve per:", opts: ["Rilevare e rimuovere i pixel corrotti causati da pressione eccessiva del dito sul sensore ottico", "Aumentare la risoluzione spaziale dell'immagine interpolando i pixel mancanti tra le creste papillari", "Allargare la dinamica dei toni di grigio dell'immagine, che nelle impronte è spesso molto limitata", "Separare le regioni di foreground (impronta) dal background tramite sogliatura adattiva dell'istogramma"], ans: 2, expl: "Le immagini di impronte hanno dinamica dei toni di grigio molto limitata. Il contrast stretching allarga questa dinamica usando tutto il range disponibile → migliora la qualità per i passi successivi.", cat: "IMPR"},

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleOptions(questions) {
  return questions.map(q => {
    const correctText = q.opts[q.ans];
    const indices = Array.from({length: q.opts.length}, (_, i) => i);
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    const newOpts = indices.map(i => q.opts[i]);
    const newAns = newOpts.indexOf(correctText);
    return { ...q, opts: newOpts, ans: newAns };
  });
}

                  <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              )}
            </button>
          </div>
          <h1 style={{fontSize:24,color:"#ff4444",marginBottom:4,letterSpacing:2}}>SISTEMI</h1>
          <h1 style={{fontSize:24,color:"#ff4444",marginTop:0,letterSpacing:2}}>BIOMETRICI</h1>
          <p style={{color:T.textMuted,fontSize:12,marginBottom:24}}>Creato da Gabriele Lannutti</p>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {(() => {
              const unconqueredCount = QUESTIONS.length - masteredCount;
              const showConquista = unconqueredCount > 0;
              const shownCount = Math.min(20, unconqueredCount);
              const conquistaLabel = "DOMANDE NUOVE (" + shownCount + (shownCount === 1 ? " domanda non appresa)" : " domande non apprese)");
              const buttons = [
                {label:"SIMULAZIONE ESAME (40 domande, 40 min, voto)",action:()=>startQuiz(40,true),color:"#ff4444"},
                showConquista
                  ? {label:conquistaLabel,action:startConquista,color:"#44aaff"}
                  : {label:"RIPASSO VELOCE (20 domande)",action:()=>startQuiz(20,false),color:"#44aaff"},
                {label:"TUTTE LE " + QUESTIONS.length + " DOMANDE",action:()=>startQuiz(QUESTIONS.length,false),color:"#aa44ff"},
              ];
              return buttons.map((btn,i)=>(
                <button key={i} onClick={btn.action}
                  style={{padding:"14px 20px",background:"transparent",border:`2px solid ${btn.color}`,color:btn.color,fontSize:13,fontFamily:"inherit",cursor:"pointer",borderRadius:4,fontWeight:700,transition:"all 0.2s"}}
                  onMouseEnter={e=>{e.target.style.background=btn.color;e.target.style.color="#0a0a0f"}}
                  onMouseLeave={e=>{e.target.style.background="transparent";e.target.style.color=btn.color}}>
                  {btn.label}
                </button>
              ));
            })()}

            {/* Easter egg button — only when all mastered */}
            {masteredCount >= QUESTIONS.length && !certRedeemed && (
              <button onClick={() => {setShowCert(true);setCertGenerated(false);}}
                style={{padding:"14px 20px",background:"transparent",border:"2px solid #c8860a",color:darkMode?"#ffd700":"#996600",fontSize:13,fontFamily:"inherit",cursor:"pointer",borderRadius:4,fontWeight:700,transition:"all 0.2s"}}
                onMouseEnter={e=>{e.target.style.background=darkMode?"#ffd700":"#c8860a";e.target.style.color="#0a0a0f"}}
                onMouseLeave={e=>{e.target.style.background="transparent";e.target.style.color=darkMode?"#ffd700":"#996600"}}>
                {"🏆 HAI APPRESO TUTTO — RITIRA IL CERTIFICATO"}
              </button>
            )}

            

            {ripassoCount > 0 && (
              <button onClick={startRipasso}
                style={{padding:"14px 20px",background:"transparent",border:"2px solid #00cc66",color:"#00cc66",fontSize:13,fontFamily:"inherit",cursor:"pointer",borderRadius:4,fontWeight:700,transition:"all 0.2s",marginTop:4}}
                onMouseEnter={e=>{e.target.style.background="#00cc66";e.target.style.color="#0a0a0f"}}
                onMouseLeave={e=>{e.target.style.background="transparent";e.target.style.color="#00cc66"}}>
                {"RIPASSO (" + ripassoCount + " domande da rivedere)"}
              </button>
            )}
          </div>

          {/* Unified stats box */}
          <div style={{marginTop:20,padding:"12px 16px",background:T.cardBg2,borderRadius:6,border:`1px solid ${T.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:11,color:T.textMuted}}>Domande apprese</span>
              <span style={{fontSize:13,fontWeight:900,color: masteredCount >= QUESTIONS.length ? "#00ff88" : masteredCount >= QUESTIONS.length*0.75 ? "#44aaff" : masteredCount >= QUESTIONS.length*0.5 ? "#ff8800" : "#ff4444"}}>{masteredCount}/{QUESTIONS.length}</span>
            </div>
            <div style={{height:6,background:darkMode?"#1a1a2e":"#ddd",borderRadius:3,overflow:"hidden",marginBottom: (streak > 0 || bestStreak > 0) ? 8 : 0}}>
              <div style={{height:"100%",borderRadius:3,transition:"width 0.5s ease",width:`${(masteredCount/QUESTIONS.length)*100}%`,background: masteredCount >= QUESTIONS.length ? "#00ff88" : masteredCount >= QUESTIONS.length*0.75 ? "#44aaff" : masteredCount >= QUESTIONS.length*0.5 ? "#ff8800" : "#ff4444"}}/>
            </div>
            {streak > 0 && (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom: bestStreak > 0 ? 4 : 0}}>
                <span style={{fontSize:11,color:T.textMuted}}>Streak attuale</span>
                <span style={{fontSize:12,fontWeight:700,color:"#ff8800"}}>{getStreakFires(streak)} {streak}</span>
              </div>
            )}
            {bestStreak > 0 && (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,color:T.textMuted}}>Miglior streak</span>
                <span style={{fontSize:12,fontWeight:700,color:"#e07020"}}>{getStreakFires(bestStreak)} {bestStreak}</span>
              </div>
            )}
          </div>

          {/* Reset — ghost button, very discreet */}
          {masteredCount > 0 && (
            <p onClick={() => setShowResetConfirm(true)} style={{color:darkMode?"#2a2a2a":"#ccc",fontSize:9,marginTop:12,cursor:"pointer",transition:"color 0.2s"}} onMouseEnter={e=>e.target.style.color=darkMode?"#555":"#888"} onMouseLeave={e=>e.target.style.color=darkMode?"#2a2a2a":"#ccc"}>Reset progresso</p>
          )}

          {/* Reset confirm — step 1 */}
          {showResetConfirm && !showResetFinal && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:T.cardBg,border:"1px solid #ff4444",borderRadius:8,padding:24,textAlign:"center",maxWidth:340}}>
                <p style={{fontSize:13,marginBottom:6,color:"#ff8888",fontWeight:700}}>Attenzione</p>
                <p style={{fontSize:12,marginBottom:16,color:T.textSoft}}>Stai per cancellare tutto il progresso: domande apprese, domande da ripassare, streak attuale e record streak. Questa azione è irreversibile.</p>
                <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                  <button onClick={() => setShowResetFinal(true)} style={{padding:"8px 20px",background:"#ff4444",color:"#000",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>CONTINUA</button>
                  <button onClick={() => {setShowResetConfirm(false);setShowResetFinal(false);}} style={{padding:"8px 20px",background:"transparent",color:"#44aaff",border:"1px solid #44aaff",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>ANNULLA</button>
                </div>
              </div>
            </div>
          )}

          {/* Reset confirm — step 2 (final) */}
          {showResetConfirm && showResetFinal && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:T.cardBg,border:"1px solid #ff4444",borderRadius:8,padding:24,textAlign:"center",maxWidth:340}}>
                <p style={{fontSize:13,marginBottom:6,color:"#ff4444",fontWeight:700}}>Sei davvero sicuro?</p>
                <p style={{fontSize:12,marginBottom:16,color:T.textSoft}}>Perderai {masteredCount} domande apprese, {ripassoCount} domande nel ripasso e il tuo record streak di {bestStreak}. Non si può tornare indietro.</p>
                <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                  <button onClick={resetAllProgress} style={{padding:"8px 20px",background:"#ff4444",color:"#000",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>SÌ, CANCELLA TUTTO</button>
                  <button onClick={() => {setShowResetConfirm(false);setShowResetFinal(false);}} style={{padding:"8px 20px",background:"transparent",color:"#44aaff",border:"1px solid #44aaff",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>ANNULLA</button>
                </div>
              </div>
            </div>
          )}


          {/* Certificate modal */}
          {showCert && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
              {/* Confetti */}
              {[...Array(40)].map((_,i) => (
                <div key={i} style={{
                  position:"fixed",
                  top:"-10px",
                  left: `${Math.random()*100}%`,
                  width: `${6+Math.random()*8}px`,
                  height: `${6+Math.random()*8}px`,
                  background: ["#ff4444","#ffd700","#00ff88","#44aaff","#aa44ff","#ff8800","#ff69b4","#00ccff"][i%8],
                  borderRadius: Math.random()>0.5 ? "50%" : "2px",
                  animation: `confetti-fall ${2+Math.random()*3}s linear ${Math.random()*2}s infinite, confetti-sway ${1+Math.random()*2}s ease-in-out ${Math.random()}s infinite alternate`,
                  zIndex:1001,
                  pointerEvents:"none"
                }}/>
              ))}

              <div style={{background:T.bg,borderRadius:12,padding:0,maxWidth:420,width:"100%",position:"relative",zIndex:1002}}>
                {!certGenerated ? (
                  <div style={{padding:32,textAlign:"center"}}>
                    <p style={{fontSize:40,marginBottom:8}}>🏆</p>
                    <h2 style={{color:"#ffd700",fontSize:20,marginBottom:8,fontFamily:"inherit"}}>HAI COMPLETATO TUTTO!</h2>
                    <p style={{color:T.textMuted,fontSize:12,marginBottom:24}}>{"Tutte le " + QUESTIONS.length + " domande apprese. Inserisci il tuo nome per generare il certificato."}</p>
                    <input
                      type="text"
                      value={certName}
                      onChange={e => setCertName(e.target.value)}
                      placeholder="Il tuo nome"
                      style={{width:"100%",padding:"10px 14px",background:T.inputBg,border:`1px solid ${T.borderLight}`,borderRadius:4,color:T.text,fontSize:14,fontFamily:"inherit",outline:"none",textAlign:"center",marginBottom:16}}
                    />
                    <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                      <button onClick={() => {if(certName.trim()){try{localStorage.setItem("sisbio_cert_name",certName.trim())}catch(e){} setCertGenerated(true);}}}
                        style={{padding:"10px 24px",background: certName.trim()?"#ffd700":"#333",color:certName.trim()?"#0a0a0f":"#666",border:"none",borderRadius:4,fontWeight:700,cursor:certName.trim()?"pointer":"default",fontFamily:"inherit",fontSize:13,transition:"all 0.2s"}}>
                        GENERA CERTIFICATO
                      </button>
                      <button onClick={() => setShowCert(false)}
                        style={{padding:"10px 24px",background:"transparent",color:"#555",border:"1px solid #333",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
                        CHIUDI
                      </button>
                    </div>
                  </div>
                ) : (
                  <div style={{padding:0}}>
                    {/* Certificate */}
                    <div style={{
                      margin:20,
                      padding:32,
                      border:"2px solid #ffd700",
                      borderRadius:8,
                      background:"linear-gradient(145deg, #0d0d14, #111122)",
                      animation:"cert-glow 3s ease-in-out infinite",
                      textAlign:"center"
                    }}>
                      <p style={{fontSize:10,color:"#ffd700",letterSpacing:4,marginBottom:16,textTransform:"uppercase"}}>Certificato di Preparazione</p>
                      <div style={{width:40,height:1,background:"#ffd700",margin:"0 auto 16px",opacity:0.5}}/>
                      <p style={{fontSize:12,color:"#888",marginBottom:8,lineHeight:1.6}}>Si attesta che</p>
                      <p style={{fontSize:22,color:"#fff",fontWeight:900,marginBottom:8}}>{certName}</p>
                      <p style={{fontSize:12,color:"#888",lineHeight:1.6,marginBottom:16}}>
                        ha completato con successo tutte le <span style={{color:"#ffd700",fontWeight:700}}>{QUESTIONS.length}</span> domande del
                      </p>
                      <p style={{fontSize:14,color:"#ff4444",fontWeight:700,marginBottom:16}}>Sistemi Biometrici</p>
                      <div style={{width:40,height:1,background:"#ffd700",margin:"0 auto 20px",opacity:0.5}}/>
                      <p style={{fontSize:10,color:"#666",marginBottom:4}}>Firmato</p>
                      <p style={{fontSize:14,color:"#ccc",fontStyle:"italic"}}>Gabriele Lannutti</p>
                      <p style={{fontSize:9,color:"#444",marginTop:16}}>{new Date().toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"})}</p>
                    </div>
                    <div style={{textAlign:"center",padding:"0 20px 20px"}}>
                      <button onClick={() => setShowCert(false)}
                        style={{padding:"10px 24px",background:"transparent",color:"#ffd700",border:"1px solid #ffd700",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>
                        CHIUDI
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // STUDY MODE
  if (mode === "study") {
    const CAT_ORDER = [
      {code:"MET1", name:"Metriche: FMR, FNMR, EER, Soglia"},
      {code:"MET2", name:"Metriche: CMC, DET, ROC, Valutazione"},
      {code:"ZOO", name:"Zoo di Doddington"},
      {code:"MULTI", name:"Sistemi Multimodali"},
      {code:"IMPR", name:"Impronte Digitali"},
      {code:"IRIDE", name:"Iride"},
      {code:"VOLTO", name:"Volto 2D e 3D"},
      {code:"TATTO", name:"Mano, Palmo e Vene"},
      {code:"RETINA", name:"Retina"},
      {code:"VOCE", name:"Voce e Speaker Recognition"},
      {code:"FIRMA", name:"Firma Biometrica"},
      {code:"DNA", name:"DNA"},
      {code:"ORECCHIO", name:"Orecchio"},
      {code:"KEY", name:"Keystroke Dynamics"},
      {code:"ATK", name:"Attacchi e Anti-spoofing"},
      {code:"DEEP", name:"Deepfake"},
      {code:"PRIV", name:"Privacy e Template Protection"},
      {code:"IDAUT", name:"Identificazione, Autenticazione e Normativa"},
      {code:"STD", name:"Standard e Best Practices"},
      {code:"SENS", name:"Sensori e Ottiche"},
      {code:"CNN", name:"CNN e Deep Learning"},
      {code:"ITT", name:"ITT e CAPTCHA"},
      {code:"POP", name:"Proof of Personhood e WorldCoin"},
    ];
    const LETTERS = ["A","B","C","D","E"];
    const grouped = {};
    QUESTIONS.forEach(q => {
      if (!grouped[q.cat]) grouped[q.cat] = [];
      grouped[q.cat].push(q);
    });
    return (
      <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'JetBrains Mono','Fira Code',monospace",padding:16,overflowY:"auto"}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h1 style={{fontSize:18,color:"#44aaff",margin:0}}>MODALITÀ STUDIO</h1>
            <button onClick={()=>setMode("menu")} style={{background:"transparent",border:"1px solid "+T.border,color:T.textMuted,fontSize:11,padding:"6px 14px",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>TORNA AL MENU</button>
          </div>
          <p style={{color:T.textMuted,fontSize:11,marginBottom:20}}>{QUESTIONS.length} domande organizzate in {CAT_ORDER.length} categorie. Tocca una categoria per espanderla.</p>
          {CAT_ORDER.map(cat => {
            const qs = grouped[cat.code] || [];
            if (qs.length === 0) return null;
            return (
              <details key={cat.code} style={{marginBottom:8}}>
                <summary style={{cursor:"pointer",padding:"10px 14px",background:T.cardBg,border:"1px solid "+T.border,borderRadius:4,fontSize:12,fontWeight:700,color:"#44aaff",listStyle:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{cat.name}</span>
                  <span style={{color:T.textMuted,fontWeight:400,fontSize:11}}>{qs.length} domande</span>
                </summary>
                <div style={{borderLeft:"2px solid #44aaff",marginLeft:8,paddingLeft:12,marginTop:4}}>
                  {qs.map((q,i) => (
                    <div key={i} style={{background:T.cardBg,borderRadius:4,padding:12,marginBottom:6,fontSize:11,border:"1px solid "+T.border}}>
                      <p style={{color:T.text,fontWeight:600,marginBottom:8,lineHeight:1.4}}>{q.q}</p>
                      <p style={{color:"#00cc66",fontWeight:700,marginBottom:4}}>{q.opts[q.ans]}</p>
                      <p style={{color:T.textMuted,fontStyle:"italic",lineHeight:1.4,fontSize:10}}>{q.expl}</p>
                    </div>
                  ))}
                </div>
              </details>
            );
          })}
          <button onClick={()=>setMode("menu")} style={{display:"block",margin:"20px auto",padding:"12px 30px",background:"#44aaff",color:darkMode?"#0a0a0f":"#fff",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",borderRadius:4,fontFamily:"inherit"}}>TORNA AL MENU</button>
        </div>
      </div>
    );
  }

  // RESULTS
  if (mode === "results") {
    const pct = Math.round((score/questions.length)*100);
    const grade = calcGrade(score, questions.length);
    const gradeLabel = isSimulation ? (grade >= 18 ? `VOTO STIMATO: ${grade >= 31 ? "30 e Lode" : grade}/30` : `VOTO STIMATO: ${grade}/30 (INSUFFICIENTE)`) : null;
    const pctColor = pct>=90?"#00ff88":pct>=75?"#44aaff":pct>=60?"#ff8800":"#ff4444";
    const verdict = pct>=90?"ECCELLENTE":pct>=75?"BUONO":pct>=60?"SUFFICIENTE":"INSUFFICIENTE";
    return (
      <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'JetBrains Mono',monospace",padding:20,overflowY:"auto"}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <h1 style={{color:pctColor,fontSize:28,textAlign:"center"}}>{verdict}</h1>
          {isSimulation && grade !== null && <p style={{textAlign:"center",fontSize:20,color:grade>=18?"#00ff88":"#ff4444",fontWeight:900}}>{gradeLabel}</p>}
          <div style={{textAlign:"center",marginBottom:20}}>
            <span style={{fontSize:44,color:pctColor,fontWeight:900}}>{score}/{questions.length}</span>
            <span style={{color:T.textMuted,fontSize:13,display:"block"}}>({pct}%) — Tempo: {formatTime(elapsed)}</span>
          </div>
          {wrong.length>0&&(<div>
            <h2 style={{color:"#ff4444",fontSize:15,borderBottom:`1px solid ${T.borderLight}`,paddingBottom:8}}>ERRORI DA RIPASSARE ({wrong.length})</h2>
            {wrong.map((w,i)=>(
              <div key={i} style={{background:T.cardBg,borderLeft:"3px solid #ff4444",padding:12,marginBottom:10,borderRadius:4,fontSize:11}}>
                <p style={{color:"#ff8888",fontWeight:700,marginBottom:6}}>{w.q}</p>
                <p style={{color:"#00ff88"}}>{w.opts[w.ans]}</p>
                <p style={{color:T.textMuted,fontStyle:"italic",marginTop:4}}>{w.expl}</p>
              </div>
            ))}
          </div>)}
          <button onClick={()=>setMode("menu")} style={{display:"block",margin:"20px auto",padding:"12px 30px",background:"#ff4444",color:darkMode?"#0a0a0f":"#fff",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",borderRadius:4,fontFamily:"inherit"}}>TORNA AL MENU</button>
        </div>
      </div>
    );
  }

  // QUIZ
  const q = questions[current];
  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'JetBrains Mono',monospace",display:"flex",flexDirection:"column"}}>
      {showExitConfirm && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:T.cardBg,border:`1px solid ${isCleanExit ? "#44aaff" : "#ff4444"}`,borderRadius:8,padding:24,textAlign:"center",maxWidth:340}}>
            <p style={{fontSize:14,marginBottom:16,color:T.text}}>{isCleanExit
              ? "Vuoi tornare al menu? La tua streak è al sicuro."
              : "Vuoi davvero abbandonare? Hai una domanda aperta — la streak verrà azzerata."
            }</p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={confirmExit} style={{padding:"8px 20px",background:isCleanExit?"#44aaff":"#ff4444",color:"#000",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{isCleanExit ? "TORNA AL MENU" : "SÌ, ESCI"}</button>
              <button onClick={cancelExit} style={{padding:"8px 20px",background:"transparent",color:"#44aaff",border:"1px solid #44aaff",borderRadius:4,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>ANNULLA</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:`1px solid ${T.border}`,fontSize:12}}>
        <span style={{color:"#ff4444",fontWeight:700}}>{current+1}/{questions.length}</span>
        <div style={{display:"flex",gap:16}}>
          <span style={{color:"#00ff88"}}>✓ {score}</span>
          <span style={{color:"#ff4444"}}>✗ {wrong.length}</span>
          {streak > 0 && <span style={{color:"#ff8800"}}>{getStreakFires(streak)} {streak}</span>}
        </div>
        <span style={{color: isSimulation && (2400-elapsed)<300 ? "#ff4444" : T.textMuted}}>{isSimulation ? formatCountdown(elapsed) : formatTime(elapsed)}</span>
        <button onClick={handleExit} style={{background:"transparent",border:`1px solid ${T.textFaint}`,color:T.textMuted,fontSize:10,padding:"4px 10px",borderRadius:3,cursor:"pointer",fontFamily:"inherit"}}>ESCI</button>
      </div>
      <div style={{height:3,background:darkMode?"#1a1a2e":"#ddd"}}><div style={{height:"100%",background: isSimulation?"#ff4444":"#44aaff",width:`${((current+1)/questions.length)*100}%`,transition:"width 0.3s"}}/></div>
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:16,maxWidth:700,margin:"0 auto",width:"100%"}}>
        <p style={{fontSize:14,lineHeight:1.5,color:T.text,fontWeight:600,marginBottom:20,minHeight:50}}>{q.q}</p>
        <div style={{display:"flex",flexDirection:"column",gap:8,flex:1}}>
          {q.opts.map((opt,i)=>{
            let bg="transparent",border=T.borderLight,col=T.textSoft;
            if(revealed){
              if(i===q.ans){bg=darkMode?"#0a2e0a":"#e6f9ed";border="#00ff88";col=darkMode?"#00ff88":"#007a3d"}
              else if(i===selected){bg=darkMode?"#2e0a0a":"#fde8e8";border="#ff4444";col="#ff4444"}
            } else if(i===selected){bg=darkMode?"#1a1a3e":"#e8eeff";border="#44aaff";col="#44aaff"}
            return(
              <button key={i} onClick={()=>handleSelect(i)}
                style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",background:bg,border:`1.5px solid ${border}`,color:col,fontSize:12,fontFamily:"inherit",cursor:revealed?"default":"pointer",borderRadius:4,textAlign:"left",lineHeight:1.4,transition:"all 0.15s"}}>
                <span style={{fontWeight:900,minWidth:18,color:border===T.borderLight?T.textFaint:col}}>{LETTERS[i]}.</span>
                <span>{opt}</span>
              </button>
            );
          })}
        </div>
        {/* Streak toast — above explanation */}
        {streakToast && (
          <div style={{
            display:"flex",
            justifyContent:"center",
            marginTop:8,
            animation: "toast-in 0.3s ease-out"
          }}>
            <div style={{
              padding: streakToast.style==="skull" ? "16px 24px" : streakToast.style==="epic" ? "12px 20px" : "10px 18px",
              background: streakToast.style==="skull" ? "rgba(100,0,180,0.95)" : streakToast.style==="epic" ? "rgba(170,68,255,0.2)" : "rgba(255,136,0,0.15)",
              border: streakToast.style==="skull" ? "2px solid #aa44ff" : streakToast.style==="epic" ? "1px solid rgba(170,68,255,0.5)" : "1px solid rgba(255,136,0,0.3)",
              borderRadius:8,
              textAlign:"center",
              animation: streakToast.style==="skull" ? "toast-skull-shake 0.8s ease-in-out" : streakToast.style==="epic" ? "toast-epic-pulse 1.5s ease-in-out infinite" : "toast-glow-pulse 1.5s ease-in-out infinite"
            }}>
              <p style={{
                fontSize: streakToast.style==="skull" ? 18 : streakToast.style==="epic" ? 15 : 14,
                fontWeight:700,
                color: streakToast.style==="skull" ? "#fff" : streakToast.style==="epic" ? "#aa44ff" : "#ff8800",
                fontFamily:"inherit",
                margin:0
              }}>
                {streakToast.fires} {streakToast.msg}
              </p>
            </div>
          </div>
        )}
        {revealed&&(
          <div style={{background:T.cardBg3,border:`1px solid ${T.borderLight}`,borderRadius:4,padding:12,marginTop:12,fontSize:11,lineHeight:1.5}}>
            <span style={{color:selected===q.ans?"#00ff88":"#ff4444",fontWeight:900}}>{selected===q.ans?"✓ CORRETTO":"✗ SBAGLIATO"}</span>
            <p style={{color:T.textMuted,marginTop:6}}>{q.expl}</p>
          </div>
        )}
        <div style={{marginTop:12,display:"flex",gap:10}}>
          {!revealed?(
            <button onClick={handleConfirm} disabled={selected===null}
              style={{flex:1,padding:"12px",background:selected!==null?"#44aaff":(darkMode?"#222":"#ddd"),color:selected!==null?"#000":(darkMode?"#555":"#999"),border:"none",fontSize:14,fontWeight:900,cursor:selected!==null?"pointer":"default",borderRadius:4,fontFamily:"inherit",transition:"all 0.2s"}}>
              CONFERMA
            </button>
          ):(
            <button onClick={handleNext}
              style={{flex:1,padding:"12px",background:"#ff4444",color:darkMode?"#0a0a0f":"#fff",border:"none",fontSize:14,fontWeight:900,cursor:"pointer",borderRadius:4,fontFamily:"inherit"}}>
              {current+1>=questions.length?"VEDI RISULTATI":"PROSSIMA →"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(BiometriaQuiz));
  </script>
</body>
</html>
