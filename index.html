  <title>Sistemi Biometrici — Quiz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0a0f; overflow-x: hidden; transition: background 0.3s; }
    #root { min-height: 100vh; min-height: 100dvh; }
    @keyframes confetti-fall {
      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    @keyframes confetti-sway {
      0%, 100% { margin-left: 0; }
      50% { margin-left: 50px; }
    }
    @keyframes cert-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.3); }
      50% { box-shadow: 0 0 40px rgba(255,215,0,0.6); }
    }
    @keyframes toast-in {
      0% { transform: translateY(-30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes toast-out {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-20px); opacity: 0; }
    }
    @keyframes toast-glow-pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(255,136,0,0.3); }
      50% { box-shadow: 0 0 25px rgba(255,136,0,0.6); }
    }
    @keyframes toast-epic-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(170,68,255,0.4); transform: scale(1); }
      50% { box-shadow: 0 0 40px rgba(170,68,255,0.8); transform: scale(1.02); }
    }
    @keyframes toast-skull-shake {
      0%, 100% { transform: scale(1) rotate(0deg); }
      10% { transform: scale(1.05) rotate(-2deg); }
      20% { transform: scale(1.05) rotate(2deg); }
      30% { transform: scale(1.05) rotate(-2deg); }
      40% { transform: scale(1.05) rotate(2deg); }
      50% { transform: scale(1.05) rotate(0deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

const QUESTIONS = [
{q: "Un sistema di controllo frontiere scansiona l'iride di un viaggiatore e la confronta con un database di 10 milioni di persone senza che il viaggiatore dichiari la propria identità. Si tratta di:", opts: ["Autenticazione, perché il viaggiatore è fisicamente presente", "Identificazione, perché il sistema confronta con tutto il DB senza identità dichiarata", "Identificazione positiva, perché il viaggiatore dichiara esplicitamente la propria identità prima del confronto", "Autenticazione, perché il sistema usa un tratto biometrico forte"], ans: 1, expl: "Non c'è identity claim: il sistema confronta la probe con l'intero database, quindi si tratta di identificazione 1:N. In questa formulazione la risposta corretta è Identificazione.", sel: true, cat: "IRIDE"},
{q: "Un sistema controlla che nessuno si iscriva due volte al welfare usando identità diverse. È un esempio di:", opts: ["Verifica biometrica con blacklist", "Autenticazione 1:1", "Identificazione negativa", "Identificazione positiva"], ans: 2, expl: "Si vuole impedire che una persona usi più identità → Identificazione Negativa. 'Negativa' non significa rifiuto ma 'verificare che NON sia già presente con un'altra identità'.", cat: "IDAUT"},
{q: "Il False Match è classificato come errore di:", opts: ["Tipo II, mancato allarme", "Non è classificabile nei tipi standard", "Tipo III", "Tipo I, falso allarme"], ans: 0, expl: "Controintuitivo: il False Match è Tipo II (mancato allarme — il sistema non rileva l'impostore). Il False Non-Match è Tipo I (falso allarme — rifiuta un genuino).", sel: true, cat: "MET1"},
{q: "Le 7 proprietà di un tratto biometrico includono la 'Performabilità'. Questa misura:", opts: ["La facilità con cui il tratto può essere misurato quantitativamente", "L'accuratezza dell'identificazione in condizioni operative reali", "La velocità di acquisizione del sensore", "La resistenza del tratto ai tentativi di spoofing"], ans: 1, expl: "Misurabilità = il sensore riesce a catturare il tratto. Performabilità = le prestazioni del sistema in condizioni reali. La D è la Circonvenzione.", cat: "ATK"},
{q: "Il Binning Error nel contesto delle impronte comporta tipicamente:", opts: ["Con alta probabilità un mancato match del genuino perché viene cercato nel bin sbagliato", "Un aumento del False Match Rate per eccesso di confronti tra template di classi diverse", "Una riduzione della qualità del template estratto", "Un aumento del tempo complessivo di ricerca nel database"], ans: 0, expl: "Nel materiale del corso, se il classificatore sbaglia bin e l'utente era registrato, con alta probabilità non si avrà match perché i template corretti sono in un bin diverso.", sel: true, cat: "IMPR"},
{q: "La sequenza corretta dei moduli durante la fase di Enrollment è:", opts: ["Acquisizione → Creazione template → Feature Extraction → Database", "Database → Acquisizione → Feature Extraction → Creazione template", "Acquisizione → Feature Extraction → Creazione template → Database", "Feature Extraction → Acquisizione → Creazione template → Database"], ans: 2, expl: "Prima si acquisisce, poi si estraggono le feature, poi si crea il template, infine si memorizza nel database.", cat: "SENS"},
{q: "In un sistema di videosorveglianza, il frame attualmente acquisito dalla telecamera è:", opts: ["La Probe", "Un template di enrollment", "La Gallery", "Un campione di riferimento"], ans: 0, expl: "Il frame corrente è la Probe (ciò che arriva adesso). La Gallery è il database dei template già registrati.", sel: true, cat: "SENS"},
{q: "Se il match score tra probe e template memorizzato risulta perfettamente uguale (distanza nulla), il sistema dovrebbe:", opts: ["Richiedere una seconda acquisizione con un sensore diverso", "Abbassare la soglia per i confronti successivi", "Accettare immediatamente l'utente con massima confidenza", "Segnalare un'anomalia perché potrebbe essere un replay attack"], ans: 3, expl: "Due acquisizioni fisiche non sono MAI identiche (rumore, posa, illuminazione). Distanza nulla = probabile replay attack.", cat: "MET1"},
{q: "La scelta di una telecamera con doppio tempo di esposizione è utile con:", opts: ["Soggetti in movimento in regioni con forte contrasto di luminosità", "Un singolo soggetto in ambiente uniformemente illuminato", "Soggetti in rapido movimento in condizioni uniformi", "Più soggetti fermi in regioni con luminosità estremamente diversa"], ans: 3, expl: "Dalla simulazione: il doppio tempo è utile solo con soggetti FERMI. Con soggetti in movimento il frame a esposizione lunga li sfoca.", sel: true, cat: "SENS"},
{q: "Il Ridge Counting è classificato come feature di:", opts: ["Livello I (globale)", "Livello III (ultra-fine/pori)", "Non rientra in nessun livello della classificazione standard", "Livello II (locale/minutiae)"], ans: 0, expl: "Trappola classica: si calcola a partire dalle minutiae (Livello II) ma porta informazione NON localizzata → è Livello I.", cat: "IMPR"},
{q: "I filtri di Gabor applicati alle impronte digitali si adattano a:", opts: ["Sia l'orientamento sia la frequenza locale dei ridge", "La luminosità globale dell'immagine", "Solo la frequenza (distanza) locale dei ridge", "Solo l'orientamento locale dei ridge, trascurando la frequenza spaziale per ridurre il carico computazionale"], ans: 0, expl: "Dalla simulazione del prof: orientamento E frequenza sono entrambi parametri del filtro di Gabor (filtro adattativo più efficace per le impronte).", sel: true, cat: "IMPR"},
{q: "Un sensore restituisce immagini a 3 canali × 8 bit per pixel. I colori rappresentabili sono:", opts: ["8 milioni, calcolati usando una singola matrice di Bayer per l'interpolazione cromatica", "768", "256", "16,7 milioni (256³)"], ans: 3, expl: "256³ = 16.777.216 ≈ 16,7 milioni. La A sarebbe vera solo con 1 canale. 768 = 3×256 è un errore di moltiplicazione.", sel: true, cat: "SENS"},
{q: "L'acquisizione multispettrale per le impronte digitali:", opts: ["Richiede necessariamente luce UV per eccitare i pigmenti della pelle e rivelare le creste papillari", "Funziona solo con sensori capacitivi di ultima generazione che rilevano la conducibilità a più frequenze", "È possibile con sensori avanzati e permette di leggere sotto la superficie della pelle", "È limitata ai sensori ottici FTIR e non è compatibile con i sensori a stato solido per acquisizione live"], ans: 2, expl: "Dalla simulazione: l'acquisizione multispettrale è applicabile anche alle impronte, non solo a volto/sorveglianza.", sel: true, cat: "VOLTO"},
{q: "I sensori CMOS e CCD sono praticamente equivalenti in campo biometrico.", opts: ["Falso, il CCD non è più utilizzato in nessuna applicazione biometrica", "Vero, le differenze residue sono trascurabili nei moderni sistemi embedded", "Vero, entrambi offrono global shutter nativo", "Falso, ci sono differenze significative anche se il gap si sta riducendo"], ans: 3, expl: "Dalla simulazione: FALSO. CCD = global shutter nativo, migliore SNR, più costoso. CMOS = rolling shutter, più economico, elaborazione on-chip.", sel: true, cat: "SENS"},
{q: "Per la biometria del volto e delle mani, il numero di bit per pixel non è influente.", opts: ["Falso, ma il miglioramento è trascurabile oltre i 4 bit per la maggior parte dei matcher commerciali", "Vero, ma solo per il volto e non per le mani", "Falso, più bit per pixel migliorano gli algoritmi di enhancement e filtraggio", "Vero, 8 bit sono sempre sufficienti indipendentemente dall'applicazione"], ans: 2, expl: "Dalla simulazione: FALSO. Più bit/pixel = minore quantizzazione = migliori algoritmi. Vale per qualsiasi biometria basata su immagini.", sel: true, cat: "VOLTO"},
{q: "Un dispositivo di conversione analogico-digitale (ADC) è praticamente sempre incluso nei sensori per immagini usati in biometria.", opts: ["Vero: qualsiasi grandezza fisica va convertita in segnale digitale", "Falso: molti sensori biometrici lavorano in analogico puro", "Vero, ma solo nei sensori CCD che producono un output nativamente analogico", "Falso: la conversione avviene nel computer, non nel sensore"], ans: 0, expl: "Dalla simulazione: VERO. Qualsiasi grandezza fisica (fotoni, capacità, temperatura) deve essere convertita in digitale per essere elaborata.", sel: true, cat: "SENS"},
{q: "In alcuni sensori avanzati è possibile selezionare il numero di bit per tono di grigio di un singolo pixel.", opts: ["Vero, anche se non è generalizzato a tutti i sensori", "Vero, ma solo nei sensori CMOS e mai nei CCD", "Falso, il numero di bit è determinato esclusivamente dal software", "Falso, i dispositivi sono hardware fisso e non modificabile"], ans: 0, expl: "Dalla simulazione: VERO per dispositivi avanzati. Influenza frame rate e banda trasmessa. Non è generalizzato ma esiste.", sel: true, cat: "MET2"},
{q: "Nei sensori CMOS il problema dell'aliasing riguarda:", opts: ["Solo caratteristiche spaziali dell'immagine", "Nessuna delle precedenti: l'aliasing non si verifica nei CMOS moderni", "Sia caratteristiche spaziali sia temporali", "Solo caratteristiche temporali (frequenza di campionamento)"], ans: 2, expl: "Dalla simulazione: spaziale (battimento pattern/griglia pixel) E temporale (luce alternata a frequenza simile al frame rate).", sel: true, cat: "SENS"},
{q: "Esistono sensori biometrici per immagini con filtro polarizzatore integrato.", opts: ["Falso, il polarizzatore è sempre un accessorio esterno da montare sull'ottica", "Falso, integrarlo degraderebbe irreparabilmente la qualità", "Vero, ma solo per applicazioni spaziali e militari", "Vero, e sono utili ad es. per eliminare riflessi su vetri in sorveglianza"], ans: 3, expl: "Dalla simulazione: VERO. Esistono sensori con filtro polarizzatore integrato, utili ad es. per vedere persone attraverso il vetro di un'auto.", sel: true, cat: "SENS"},
{q: "La biometria del volto può essere realizzata analizzando il soggetto su bande ottiche diverse dal visibile.", opts: ["Falso: i filtri ottici necessari degradano la risoluzione sotto il minimo accettabile per il matching", "Vero, ma esclusivamente per la liveness detection e non per il riconoscimento dell'identità", "Falso: il volto richiede necessariamente lo spettro visibile per estrarre le feature discriminanti", "Vero: l'analisi su bande diverse (es. infrarosso) rivela caratteristiche non visibili nel solo spettro visibile"], ans: 3, expl: "Dalla simulazione: analizzare il volto su bande diverse dal visibile permette di vedere feature complementari.", sel: true, cat: "ATK"},
{q: "Quali delle seguenti affermazioni sono TUTTE corrette? (A) Con immagini ad ampio angolo si possono acquisire più tratti. (B) Con più bit/pixel si possono impiegare algoritmi migliori. (C) Con maggiore risoluzione si analizzano tratti a livelli diversi.", opts: ["Solo B e C sono corrette in condizioni di illuminazione ideale", "Solo A è corretta", "Solo A e B sono corrette", "Tutte e tre (A, B e C) sono corrette"], ans: 3, expl: "Dalla simulazione del prof: A, B e C sono tutte vere. Scegliere solo una o due sarebbe incompleto.", sel: true, cat: "SENS"},
{q: "La convoluzione tra un'immagine I e un kernel K si rappresenta come:", opts: ["O = I + K (somma punto a punto nell'intorno spaziale)", "O = I · K (prodotto scalare elemento per elemento)", "O = I ⊕ K (operazione XOR bit a bit sulla matrice)", "O = I * K (dove * indica la convoluzione)"], ans: 3, expl: "Dalla simulazione: O = I * K dove * è l'operatore di convoluzione (non la moltiplicazione scalare). Le altre non hanno senso su matrici.", sel: true, cat: "CNN"},
{q: "La scelta di una telecamera con doppio tempo di esposizione è utile nel caso di soggetti IN MOVIMENTO in regioni con gamma di luminosità estrema.", opts: ["Falso, ma solo perché il doppio tempo non esiste per telecamere professionali", "Vero, ma solo se il movimento è lento (< 0.5 m/s)", "Falso: il frame a esposizione lunga sfoca i soggetti in movimento rendendolo inutile", "Vero: l'esposizione combinata mappa accuratamente sia il target in moto che lo sfondo"], ans: 2, expl: "Dalla simulazione: FALSO. Il frame a esposizione lunga sfoca i soggetti in movimento → controproducente.", sel: true, cat: "SENS"},
{q: "Una gamma colore di un sensore per immagini superiore a 100 dB è particolarmente utile in applicazioni di:", opts: ["Scansione di documenti d'identità", "Riconoscimento dell'iride in laboratorio", "Acquisizione di impronte digitali a contatto per gestire dita eccessivamente secche o umide", "Videosorveglianza con contrasti ambientali estremi"], ans: 3, expl: "Dalla simulazione: la sorveglianza ha i contrasti più estremi (giorno/notte, sole/ombra). 100 dB ≈ gamma dell'occhio umano.", sel: true, cat: "IRIDE"},
{q: "Il conteggio di persone in ambienti indoor con sistemi a tecnologia 3D:", opts: ["Funziona bene solo in ambienti con illuminazione uniforme e flussi regolari a bassa densità", "Gestisce bene i flussi complessi ma è molto sensibile alle variazioni di illuminazione ambientale", "Funziona solo con flussi unidirezionali e richiede illuminazione NIR controllata supplementare", "Riesce a gestire sia importanti differenze di illuminazione sia flussi complessi"], ans: 3, expl: "Dalla simulazione: i sistemi 3D gestiscono entrambi i problemi. Dire solo uno dei due vantaggi non andrebbe bene, ma farebbe comunque ottenere punti parziali in esame.", sel: true, cat: "SENS"},
{q: "È possibile inserire funzionalità biometriche su sistemi mobili quali droni.", opts: ["Falso: la capacità computazionale del drone non è adeguata", "Falso: il continuo cambio di punto di vista rende inutilizzabile la biometria", "Vero: principalmente per il riconoscimento del volto in contesti controllati", "Vero: specialmente per sorveglianza e applicazioni similari"], ans: 3, expl: "Dalla simulazione: i droni cambiano punto di vista per risolvere occlusioni. L'elaborazione pesante va su server remoti. Uso: sorveglianza.", sel: true, cat: "VOLTO"},
{q: "La luce NIR (700-900 nm) per i sensori dell'iride viene usata perché:", opts: ["Viene riflessa dalla melanina rivelando la tessitura indipendentemente dal colore dell'occhio", "Viene assorbita selettivamente dalla melanina generando una mappa termica della superficie iridea", "Attraversa la pupilla senza riflessione sulla superficie dell'iride, illuminando la retina sottostante", "Eccita i pigmenti dell'iride producendo una fluorescenza rilevabile dal sensore monocromatico"], ans: 0, expl: "La luce visibile è assorbita dalla melanina (nasconde la tessitura). La NIR viene riflessa, rivelando i pattern.", sel: true, cat: "IRIDE"},
{q: "L'IrisCode standard ha una dimensione di:", opts: ["128 byte per il codice + 128 byte per la maschera", "1024 byte per il codice + 1024 byte per la maschera", "512 byte totali senza maschera", "256 byte per il codice + 256 byte per la maschera"], ans: 3, expl: "256 byte codice + 256 byte maschera di validità. Numero preciso da ricordare.", sel: true, cat: "IRIDE"},
{q: "L'IrisCode memorizza esclusivamente:", opts: ["L'intensità dei pixel dell'iride dopo il filtraggio", "L'informazione di fase delle Wavelet di Gabor 2D", "La posizione e il tipo delle minutiae dell'iride", "Il colore dell'iride normalizzato in scala di grigi"], ans: 1, expl: "Solo la fase → invariante a contrasto, livello di grigio e illuminazione. Massima entropia: 50% probabilità per ogni bit.", cat: "IRIDE"},
{q: "Confrontando due IrisCode di persone completamente diverse, la Distanza di Hamming attesa è circa:", opts: ["0.25 — un quarto dei bit differisce", "0.5 — metà dei bit coincide e metà no, per puro caso", "0.0 — i codici sono quasi identici per struttura morfologica dell'occhio", "0.75 — tre quarti dei bit differiscono"], ans: 1, expl: "Distribuzione binomiale centrata a 0.5. Per puro caso, metà dei bit coincide e metà no.", cat: "IRIDE"},
{q: "Nel calcolo della Distanza di Hamming tra IrisCode, le maschere servono per:", opts: ["Normalizzare la lunghezza dei due codici a 256 byte compensando le differenze di segmentazione", "Escludere le zone occluse da ciglia, palpebre e riflessi dal calcolo", "Aumentare artificialmente la distanza tra codici diversi per ridurre il tasso di falsi match", "Cifrare il template prima della trasmissione al server per la protezione della privacy dell'utente"], ans: 1, expl: "Senza maschere, i bit nelle zone occluse introdurrebbero rumore casuale alzando la HD. AND logico tra maskA e maskB.", cat: "IRIDE"},
{q: "La prima fase dell'algoritmo di Daugman per l'IrisCode utilizza:", opts: ["Un classificatore KNN per la segmentazione", "Un operatore integro-differenziale per localizzare bordi circolari", "Una trasformata di Fourier per la decomposizione frequenziale", "Un filtro di Gabor 2D per estrarre le feature"], ans: 1, expl: "L'operatore integro-differenziale cerca il centro e il raggio di pupilla e iride cercando la massima variazione di luminosità circolare.", cat: "IRIDE"},
{q: "L'unwrapping dell'iride nell'algoritmo di Daugman consiste nel:", opts: ["Linearizzare l'iride da coordinate polari (ρ, θ) a cartesiane", "Rimuovere le palpebre e le ciglia dall'immagine", "Applicare la trasformata wavelet di Gabor 2D", "Quantizzare i valori di fase nei quadranti per generare il codice binario"], ans: 0, expl: "Fase 3 di Daugman: trasformazione da coordinate polari a rappresentazione rettangolare (cartesiana).", cat: "IRIDE"},
{q: "Se più del 50% dell'iride è occluso da palpebre, ciglia o riflessi, il sistema dovrebbe:", opts: ["Procedere con il matching usando solo la parte visibile", "Abbassare la soglia di accettazione per compensare", "Riacquisire l'immagine perché l'informazione residua è insufficiente", "Usare un algoritmo alternativo progettato per occlusioni pesanti"], ans: 2, expl: "L'informazione residua è insufficiente per un matching affidabile → riacquisizione necessaria.", cat: "IRIDE"},
{q: "L'attacco del CCC al riconoscimento iride del Samsung Galaxy S8 ha utilizzato:", opts: ["Un display OLED ad alta risoluzione posizionato alla distanza focale ottimale del sensore NIR", "Una lente a contatto con il pattern irideo stampato ad altissima risoluzione e indossata dall'attaccante", "Un occhio protesico in vetro con iride dipinta a mano e rivestimento anti-riflesso in materiale ottico", "Una foto IR stampata su stampante laser con una lente a contatto umida sopra per la curvatura 3D"], ans: 3, expl: "La lente serve solo per la curvatura 3D dell'occhio, la stampa è su carta. Attacco Level 1 che inganna un device consumer.", cat: "IRIDE"},
{q: "Nell'algoritmo di Daugman, la fase 4 (Trasformata con Gabor Wavelet 2D) produce:", opts: ["Le frequenze spaziali dominanti della texture iridea dopo la normalizzazione", "I valori di fase da quantizzare per generare il codice binario", "I coefficienti di ampiezza delle wavelet usati per calcolare la distanza euclidea", "Una mappa bidimensionale delle discontinuità di intensità sulla superficie iridea"], ans: 1, expl: "La wavelet 2D di Gabor produce i valori di fase, che nella fase 5 vengono quantizzati nei quadranti per generare l'IrisCode binario.", cat: "IRIDE"},
{q: "L'Equal Error Rate (EER) è il punto in cui:", opts: ["FMR = FNMR (falsi accetti = falsi rifiuti)", "FMR + FNMR = 1 (complementari)", "FMR = 0 e FNMR = 0 (punto di accuratezza perfetta del classificatore)", "FMR = 1 e FNMR = 0 (tutti accettati)"], ans: 0, expl: "EER: unico punto in cui la percentuale di falsi accetti e falsi rifiuti sono identiche.", sel: true, cat: "MET1"},
{q: "Un sistema ha EER del 2%. In produzione il 2% degli impostori entra?", opts: ["No, l'EER vale solo alla soglia corrispondente", "Sì, indipendentemente dalla soglia scelta", "Sì, esattamente il 2% in qualsiasi configurazione", "No, l'EER misura esclusivamente i genuini rifiutati"], ans: 0, expl: "L'EER è un indice di confronto tra sistemi, non il tasso di errore operativo. In pratica il sistema opera su una soglia diversa.", cat: "MET1"},
{q: "Se si abbassa molto la soglia T in un sistema biometrico:", opts: ["Entrambi diminuiscono simultaneamente", "Entrambi i tassi aumentano simultaneamente", "FMR aumenta e FNMR diminuisce", "FMR diminuisce e FNMR aumenta"], ans: 2, expl: "Soglia bassa → più facile superarla → più impostori entrano (FMR↑) ma meno genuini rifiutati (FNMR↓).", sel: true, cat: "MET1"},
{q: "La curva CMC misura l'accuratezza di:", opts: ["Sistemi di autenticazione (1:1)", "Algoritmi di classificazione multiclasse su dataset chiusi", "Sistemi di identificazione (1:N)", "Sensori biometrici hardware"], ans: 2, expl: "CMC = Cumulative Match Characteristic, esclusivamente per identificazione 1:N. Mostra la probabilità di trovare l'identità nei primi K risultati.", sel: true, cat: "MET2"},
{q: "Secondo il materiale del corso, nel riconoscimento positivo FAR e FRR sono:", opts: ["Metriche completamente diverse da FMR e FNMR perché includono policy operative e tentativi multipli", "I nomi usati, nel contesto del riconoscimento positivo, per FMR e FNMR alla soglia scelta", "Errori di acquisizione che includono FTA e FTE", "Misure valide solo per l'identificazione negativa"], ans: 1, expl: "Nel corso il funzionamento del sistema è descritto principalmente da FMR(T) e FNMR(T). Nel caso di riconoscimento positivo, questi tassi vengono chiamati FAR(T) e FRR(T)/FNAR(T), non introdotti come categoria concettuale separata basata su policy operative.", cat: "ITT"},
{q: "Secondo il materiale del corso, i Failure To Acquire (FTA) rientrano in:", opts: ["Image acquisition errors", "Matching errors", "False Reject Rate (FRR) come sua componente esplicita", "False Match Rate (FMR)"], ans: 0, expl: "Nel materiale del corso, FTA e FTE sono trattati nella categoria degli image acquisition errors.", cat: "MET1"},
{q: "Ho testato il sistema su 1000 campioni con ZERO errori. Per la Regola del 3:", opts: ["Con il 95% di confidenza l'errore è ≤ 3/1000 = 0.3%", "Devo raggiungere almeno 30 errori per qualsiasi conclusione", "Il sistema ha errore reale = 0 con certezza assoluta", "Il test è completamente inutile"], ans: 0, expl: "Regola del 3: zero errori osservati ≠ zero errori reali. Con 95% di confidenza: p ≤ 3/N.", cat: "MET1"},
{q: "La Regola del 30 afferma che per stime affidabili dell'errore servono:", opts: ["Almeno 30 errori effettivi osservati", "Almeno 30 persone diverse nel database", "Almeno 30 campioni nel test set", "Almeno 30 fold di cross-validation"], ans: 0, expl: "Per essere sicuri al 90% che l'errore stimato sia entro ±30% dell'errore reale → almeno 30 errori effettivi.", sel: true, cat: "MET1"},
{q: "L'FTE (Failure To Enroll) misura:", opts: ["La percentuale di utenti che il sistema non riesce a registrare inizialmente", "La percentuale di utenti rifiutati durante l'uso quotidiano del sistema biometrico", "Il tasso di errore complessivo dell'algoritmo di matching calcolato su base annua", "La percentuale di falsi match causati da template di scarsa qualità nel database"], ans: 0, expl: "FTE = fallimento in fase di enrollment (es. impronte illeggibili). FTA = fallimento in fase operativa.", sel: true, cat: "MET1"},
{q: "Nell'identificazione Open-set, a differenza della Closed-set:", opts: ["La soglia decisionale è sempre fissa e non modificabile", "Il database è necessariamente più piccolo", "L'utente potrebbe non essere registrato nel sistema", "Si usa esclusivamente l'autenticazione 1:1"], ans: 2, expl: "Closed-set: l'utente è sicuramente nel DB. Open-set: potrebbe essere sconosciuto → il sistema verifica prima se esiste un match.", cat: "MET1"},
{q: "In ambito forense si preferisce operare con:", opts: ["FMR alto e FNMR basso (non perdere nessun sospetto)", "Nessun compromesso: entrambi i tassi devono essere zero", "EER il più basso possibile", "FMR basso e FNMR alto (massima sicurezza)"], ans: 0, expl: "In forense: non si vuole perdere nessun criminale (FNMR basso). Si accettano molti falsi match (FMR alto) filtrati manualmente.", sel: true, cat: "MET1"},
{q: "Con FMR=10⁻⁴ in verifica e N=10.000 in identificazione, il FNMRN:", opts: ["Rimane uguale al FNMR originale", "Dipende esclusivamente dal tipo di tratto biometrico", "Si dimezza", "Aumenta proporzionalmente a N"], ans: 0, expl: "FMRN è il False Match Rate in identificazione su N confronti; FNMRN è il False Non-Match Rate in identificazione. FNMRN = FNMR (non cambia). È il FMR che esplode: FMRN = 1-(1-FMR)^N.", cat: "MET1"},
{q: "Perché in biometria non si usa il classico parametro dell'Accuratezza globale?", opts: ["Perché dipende dalle proporzioni di genuini e impostori nel test, restituendo valori fuorvianti", "Perché non esiste una formula matematica per calcolarlo quando i campioni sono acquisiti da sensori diversi", "Perché l'accuratezza dipende dalla soglia operativa scelta dall'amministratore e non dall'algoritmo stesso", "Perché il calcolo richiede troppa potenza computazionale quando il database supera i 10.000 template"], ans: 0, expl: "L'accuratezza globale dipende da quanti genuini vs impostori testano il sistema → valore fuorviante. Si usano FMR, FNMR, EER.", cat: "MET1"},
{q: "Con la Regola del 3 e N=3000 campioni senza errori, il tasso di errore massimo garantito al 95% è:", opts: ["3/3000 = 0.001 (0.1%)", "30/3000 = 0.01 (1%)", "3/3000 = 0.003 (0.3%)", "0 (zero errori osservati = zero errore reale)"], ans: 0, expl: "3/N = 3/3000 = 0.001 = 0.1%. La D è la trappola: zero errori osservati ≠ zero errori reali.", sel: true, cat: "MET1"},
{q: "Il Binning Error con probabilità di errore singola p=0.05 e 2 classificazioni è circa:", opts: ["9.75% (1 − 0.95²)", "Esattamente 10% (2 × 5%)", "5% (uguale alla singola)", "2.5% (5% / 2)"], ans: 0, expl: "Binning Error = 1 − (1−0.05)² = 1 − 0.9025 = 0.0975 ≈ 9.75%. Non è 2×5% ma 2p−p².", cat: "IMPR"},
{q: "Con FMR=10⁻⁴ in verifica e N=10.000 in identificazione, il FMRN esatto è circa:", opts: ["0.632 (63.2%): dalla formula esatta 1−(1−FMR)^N", "0.001 (0.1%), sostanzialmente uguale", "10⁻⁴ (uguale al valore in verifica)", "1.0 (100%): l'approssimazione lineare N·FMR"], ans: 0, expl: "FMRN = 1−(1−10⁻⁴)^10000 ≈ 0.632. L'approssimazione N·FMR=1 è al limite. Il FMR NON resta uguale.", cat: "MET1"},
{q: "La differenza tra generazione degli score Online e Offline è:", opts: ["Online genera più confronti impostori perché può ripetere i tentativi senza limiti di tempo operativi", "Offline elabora in tempo reale durante l'uso del sistema, Online salva tutto per analisi statistiche successive", "Online elabora in tempo reale; Offline salva le immagini e genera un numero enorme di confronti successivi", "Online e Offline producono le stesse distribuzioni ma Online richiede hardware dedicato per il calcolo"], ans: 2, expl: "Offline: salvataggio immagini + confronto esaustivo successivo → molti più tentativi impostore senza coinvolgere gli utenti continuamente.", cat: "MET2"},
{q: "In una valutazione operativa (Operational evaluation) è fondamentale riportare almeno:", opts: ["Il tasso di errore EER calcolato su almeno 10.000 confronti genuini e 10.000 confronti impostori", "Il tipo di sensore, l'algoritmo di matching e il numero totale di utenti registrati nel database", "Il numero totale di transazioni genuine e impostor registrate durante il periodo di valutazione", "Intervalli di confidenza, dimensione del campione, condizioni ambientali e proporzioni genuini/impostori"], ans: 3, expl: "Una evaluation seria richiede CI, dimensione campione, condizioni, proporzioni, non solo un singolo numero.", cat: "MET1"},
{q: "Raccogliere multiple transactions per person nel test migliora la valutazione perché:", opts: ["Permette di ridurre il numero di volontari richiesti per raggiungere la significatività statistica", "Riduce la varianza delle misurazioni mediando i risultati anomali", "Consente di addestrare meglio i modelli di Machine Learning associati", "Aumenta il numero di confronti genuini e impostori, rendendo le stime statistiche più affidabili"], ans: 3, expl: "Più transazioni per persona = più confronti = distribuzioni più accurate = stime di errore più affidabili.", cat: "CNN"},
{q: "I parametri chiave di una telecamera biometrica sono:", opts: ["Solo risoluzione e frame rate", "Solo il numero di megapixel", "Risoluzione, frame rate, SNR e Quantum Efficiency", "Solo risoluzione, bit depth e interfaccia di trasmissione dati"], ans: 2, expl: "Quattro parametri: Risoluzione (dettagli), Frame Rate (velocità), SNR (pulizia segnale), QE (efficienza fotoni→elettroni).", cat: "MET2"},
{q: "Le tecnologie di acquisizione 'Attive' si distinguono dalle 'Passive' perché:", opts: ["Richiedono sempre il contatto fisico con il soggetto", "Funzionano esclusivamente di giorno con luce solare", "Catturano solo la radiazione ambientale disponibile", "Usano una propria sorgente di illuminazione controllata"], ans: 3, expl: "Attive = propria sorgente controllata. Passive = usano la luce ambientale.", cat: "SENS"},
{q: "L'imaging NIR (Near-Infrared) differisce dal Termico (FIR) perché:", opts: ["Il Termico richiede un illuminatore, il NIR è passivo", "Entrambi sono tecnologie attive", "Entrambi sono passivi e catturano lunghezze d'onda diverse dello spettro visibile", "Il NIR richiede illuminatore attivo e rivela pattern superficiali"], ans: 3, expl: "NIR (700-900nm) = attivo, rimbalza sul soggetto. Termico (FIR) = passivo, cattura il calore emesso dal corpo.", cat: "IRIDE"},
{q: "Alzare gli ISO in un'acquisizione biometrica introduce:", opts: ["Un aumento del contrasto locale che evidenzia i falsi micro-dettagli della pelle", "Solo un miglioramento della qualità dell'immagine", "Una riduzione del frame rate senza effetti sulla qualità", "Rumore elettronico che distrugge le high-frequency features"], ans: 3, expl: "ISO alti → rumore elettronico → distrugge micro-dettagli → aumento FNMR.", cat: "MET1"},
{q: "Per il riconoscimento facciale servono almeno 60 pixel tra gli occhi. Con un FOV di 1500mm, i pixel orizzontali necessari sono circa:", opts: ["2500 pixel, per garantire un margine di sicurezza sui bordi dell'inquadratura", "1636 pixel (serve almeno una 2MP)", "1280 pixel (sufficiente una 1MP)", "800 pixel"], ans: 1, expl: "Distanza occhi ~55mm, 60px/55mm = 1.09 px/mm, FOV 1500mm → 1.09 × 1500 = 1636. Una 1MP (1280) non basta.", cat: "VOLTO"},
{q: "Il Depth of Field (DOF) ridotto in un sistema biometrico causa:", opts: ["Migliore isolamento del soggetto dallo sfondo con conseguente aumento dell'accuratezza", "Maggiore sensibilità alla luce ambientale con degrado del rapporto segnale/rumore", "Riduzione del frame rate necessaria per compensare l'apertura del diaframma più ampia", "Immagini sfocate con minime variazioni di posizione dell'utente, aumentando FTA"], ans: 3, expl: "DOF ridotto → minime variazioni di posizione causano sfocatura → Failure To Acquire.", cat: "MET1"},
{q: "L'EU AI Act vieta categoricamente i sistemi biometrici che:", opts: ["Acquisiscono dati biometrici senza il consenso esplicito e documentato dell'interessato", "Usano telecamere in spazi pubblici", "Richiedono il consenso esplicito dell'utente", "Inferiscono attributi sensibili come etnia, religione o orientamento sessuale"], ans: 3, expl: "Vieta i sistemi che deducono/inferiscono attributi sensibili. Permette (come 'alto rischio') le categorizzazioni funzionali.", sel: true, cat: "IDAUT"},
{q: "Memorizzare solo i template (non le immagini originali) garantisce la privacy?", opts: ["Sì, il template è una rappresentazione numerica astratta da cui non si risale al dato originale", "Sì, purché il template sia memorizzato in un Secure Element con accesso crittografato", "No, ma solo quando il template è memorizzato in chiaro senza alcuna trasformazione cancellabile", "No, esistono tecniche per ricostruire parzialmente l'immagine originale dal template"], ans: 3, expl: "Esistono tecniche di ricostruzione parziale dal template (es. ricostruire un'impronta dalle coordinate delle minuzie).", cat: "ITT"},
{q: "Secondo l'International Biometric Group (IBG), i sistemi sono più invasivi per la privacy quando:", opts: ["Sono nascosti, obbligatori, in modalità 1:N, con database centralizzati", "Operano solo in modalità 1:1 con storage locale", "Usano esclusivamente tratti comportamentali", "Sono palesi, volontari e gestiti da enti governativi centralizzati"], ans: 0, expl: "Più invasivi: covert, obbligatori, 1:N, dati a tempo indeterminato, DB centralizzati, tratti fisiologici.", cat: "MET2"},
{q: "L'uso di sistemi di emotion recognition nell'EU AI Act è:", opts: ["Completamente vietato in qualsiasi contesto senza eccezioni", "Sempre permesso se c'è il consenso dell'utente", "Vietato nei luoghi di lavoro e nelle scuole, indipendentemente dal consenso", "Permesso solo per analisi forense post-evento su mandato della magistratura"], ans: 2, expl: "Vietato in luoghi di lavoro e scuole. In altri contesti: fortemente limitato, classificato come alto rischio.", sel: true, cat: "IDAUT"},
{q: "In Italia, creare un deepfake senza diffonderlo è reato?", opts: ["No, i deepfake non sono regolamentati da alcuna norma dell'ordinamento italiano vigente", "No, l'art. 612-quater c.p. punisce solo la diffusione senza consenso", "Sì, la creazione è sempre punita penalmente indipendentemente dalla successiva diffusione", "Sì, ma esclusivamente se la vittima raffigurata nel deepfake è un soggetto minorenne"], ans: 1, expl: "L'art. 612-quater punisce la diffusione senza consenso (1-5 anni). La sola creazione non configura il reato.", sel: true, cat: "IDAUT"},
{q: "I sensori Time of Flight (ToF) nei sistemi anti-tailgating servono per:", opts: ["Calcolare la distanza e il volume dei corpi per rilevare più persone in un singolo passaggio", "Ricostruire il profilo 3D del volto di ciascun individuo per il riconoscimento facciale nel varco", "Misurare la temperatura corporea degli individui in transito per rilevare anomalie fisiologiche", "Analizzare la velocità di camminata dei soggetti per classificare comportamenti sospetti nel varco"], ans: 0, expl: "ToF = misura distanza e volume dei corpi, separando le sagome per rilevare accodamenti.", cat: "VOLTO"},
{q: "Lo standard ICAO Doc 9303 stabilisce che il tratto biometrico primario per gli e-Passport è:", opts: ["L'iride", "L'impronta digitale", "La firma digitale", "Il volto (Face)"], ans: 3, expl: "Il volto è obbligatorio per l'interoperabilità mondiale. Impronte e iride sono secondarie opzionali.", sel: true, cat: "IRIDE"},
{q: "Nelle Biometric Payment Cards (Match-on-Card), il template è memorizzato:", opts: ["Nel terminale POS del commerciante", "Nel chip sicuro della carta (Secure Element)", "In un'area protetta del database cloud gestito dal circuito MasterCard/Visa", "Nel cloud del circuito di pagamento"], ans: 1, expl: "Match-on-Card: template nel Secure Element, matching interno alla carta. Nessun dato biometrico trasmesso all'esterno.", cat: "IMPR"},
{q: "I tre fattori classici di autenticazione dell'identità sono:", opts: ["PIN, password e OTP (tutti fattori di conoscenza)", "Volto, impronta e iride (tutti fattori biometrici)", "Token hardware, smart card e certificato X.509 (tutti fattori di possesso)", "Qualcosa che sai, qualcosa che hai, qualcosa che sei"], ans: 3, expl: "Sai (PIN, password), Hai (badge, token RFID), Sei (biometria). Multi-fattore = combinazione di più fattori.", cat: "IRIDE"},
{q: "I principali svantaggi dei sistemi biometrici monomodali sono:", opts: ["Costo computazionale elevato del matching e necessità di hardware dedicato per ogni tratto", "Bassa accuratezza intrinseca e impossibilità di operare in modalità di identificazione 1:N", "Elevato FTE e necessità di enrollment multiplo per compensare la scarsa qualità dei campioni", "Rumore nei dati, variazioni intraclasse, non-universalità e vulnerabilità allo spoofing"], ans: 3, expl: "Quattro limiti intrinseci: rumore, variazioni intraclasse, non-universalità, vulnerabilità allo spoofing.", cat: "ATK"},
{q: "La categoria 'Multiple Instances' nei sistemi multibiometrici indica:", opts: ["Combinazione di tratti fisicamente diversi", "Diverse istanze dello stesso tratto", "Acquisizioni multiple dello stesso identico tratto", "Diversi sensori per lo stesso tratto"], ans: 1, expl: "Multiple Instances = istanze diverse (es. due dita diverse). Multiple Samples = acquisizioni multiple dello stesso tratto.", cat: "MULTI"},
{q: "Il livello di fusione più diffuso nei sistemi multimodali è:", opts: ["Livello Decisione (combinazione booleana Accetta/Rifiuta)", "Livello Matching Score (aggregazione punteggi)", "Livello Sensore, combinando fisicamente i dati raw prima dell'estrazione delle feature", "Livello Feature (fusione vettori)"], ans: 1, expl: "Nel materiale sui sistemi multimodali, il Match Score Level è introdotto esplicitamente come il più diffuso. La precedente formulazione riferita agli ABC non è supportata in modo diretto dai file del corso.", cat: "MULTI"},
{q: "Secondo il materiale del corso, un sistema multimodale gerarchico:", opts: ["Acquisisce i tratti in cascata in base al risultato precedente; per ridurre il tempo medio di verifica conviene acquisire prima i tratti più accurati", "Attiva tutti i sensori in parallelo e fonde i risultati a livello di score; per ridurre il tempo si usa la sum rule normalizzata", "Seleziona un solo tratto casualmente a ogni sessione e usa gli altri come backup; l'ordine viene determinato dal quality checker", "Acquisisce prima il tratto più veloce da elaborare e ricorre al più accurato solo quando lo score risulta al di sotto della soglia"], ans: 0, expl: "Nei lucidi i sistemi gerarchici lavorano in cascata a seconda del risultato precedente. Per ridurre il tempo medio di verifica, il corso dice esplicitamente di acquisire per primi i tratti più accurati, non semplicemente quelli più veloci.", sel: true, cat: "MULTI"},
{q: "Nella Quality-based Fusion, se l'impronta è sporca ma il volto è ben illuminato:", opts: ["Il sistema deve rifiutare l'utente e richiedere una nuova acquisizione completa", "Il sistema deve mediare equamente i due score indipendentemente dalla qualità", "Il sistema deve usare solo l'impronta per coerenza", "Il sistema deve basare la decisione prevalentemente sul volto"], ans: 3, expl: "La fusione intelligente dà più peso al tratto con qualità migliore per evitare falsi rifiuti causati dal rumore.", cat: "IMPR"},
{q: "Assumendo indipendenza tra i due eventi di fallimento, il FTE di un sistema multimodale con impronta (FTE=4%) e iride (FTE=7%) è:", opts: ["0.28% (0.04 × 0.07)", "11% (4% + 7%)", "7% (il peggiore dei due)", "4% (il migliore dei due)"], ans: 0, expl: "Nel materiale del corso il calcolo del FTE multimodale come prodotto dei fallimenti richiede l'ipotesi di indipendenza tra i due eventi. In tal caso: 0.04 × 0.07 = 0.0028 = 0.28%.", cat: "IRIDE"},
{q: "Un sistema multimodale può ridurre FTE e FTA rispetto ai singoli sistemi monomodali perché:", opts: ["Se un tratto fallisce l'acquisizione, un altro può comunque funzionare", "Aumenta il numero di tentativi permessi", "Usa sensori più costosi e quindi migliori", "Elimina i falsi rifiuti causati dall'invecchiamento dei singoli tratti"], ans: 0, expl: "La multimodalità offre ridondanza: se un tratto fallisce (FTE/FTA), l'altro compensa.", cat: "MULTI"},
{q: "Per fondere score da matcher con scale diverse (0-1000 e 0-1), prima della sum rule servono:", opts: ["Solo l'omogeneizzazione del significato", "Omogeneizzazione e poi normalizzazione", "Solo la normalizzazione alla stessa scala", "Nessun pre-processing: la sum rule gestisce scale diverse"], ans: 1, expl: "Due passi distinti: prima tutto in distanze O tutto in similitudini, poi stessa scala (es. min-max).", cat: "MULTI"},
{q: "Nella fusione a livello di Rank, la normalizzazione degli score:", opts: ["È necessaria per convertire i rank in probabilità prima della fusione con la sum rule", "È necessaria solo quando i matcher producono liste di lunghezza diversa tra loro", "È fondamentale per compensare le differenze di scala tra i matcher prima del confronto", "Non è necessaria: il rango è ordinale e dipende solo dall'ordine relativo"], ans: 3, expl: "Il rango è ordinale (1°, 2°, 3°...) → ordine relativo, non valore assoluto. Non serve normalizzare. Svantaggio: si perde l'info sulla magnitudine.", cat: "MULTI"},
{q: "Gli 8 punti di vulnerabilità di un sistema biometrico iniziano con:", opts: ["Il canale di comunicazione esterno", "Il database dei template", "Il modulo di decisione", "Il sensore di acquisizione"], ans: 3, expl: "1) Sensore → 2) Canale sensore-estrattore → 3) Estrattore → 4-5) Matcher → 6) DB → 7) Canale DB → 8) Decisione.", cat: "ATK"},
{q: "La Liveness Detection verifica se il tratto biometrico appartiene a:", opts: ["Un utente autorizzato con credenziali valide", "Un soggetto vivo e presente al momento dell'acquisizione", "Un template non corrotto nel database", "Un utente che ha aggiornato di recente il proprio template tramite template update"], ans: 1, expl: "Sottoinsieme della PAD: analizza anatomia, fisiologia (rPPG/battito), reazioni involontarie e challenge-response.", sel: true, cat: "DEEP"},
{q: "Negli attacchi non cooperativi all'impronta, il calco viene creato a partire da:", opts: ["Il template numerico estratto dal database e riconvertito in immagine con tecniche inverse", "Tracce latenti rubate da superfici, poi fotografate e elaborate", "Una scansione 3D del dito ottenuta con il consenso del soggetto durante un finto enrollment", "Un'impronta sintetica generata da una GAN addestrata su dataset di impronte pubblici"], ans: 1, expl: "Non cooperativo = impronta rubata da superfici latenti, fotografata, elaborata, stampata → 'gummy fingers'.", cat: "ATK"},
{q: "Un attaccante proietta un video deepfake su uno schermo davanti alla telecamera biometrica. Questo è:", opts: ["Nessuno dei due: è un attacco informatico", "Esclusivamente spoofing al sensore", "Esclusivamente un attacco deepfake", "Una combinazione di deepfake e spoofing"], ans: 3, expl: "Deepfake = creazione del contenuto sintetico. Spoofing = presentazione dello schermo al sensore. I due si combinano.", cat: "DEEP"},
{q: "La differenza tra attacchi Diretti (Tipo 1) e Indiretti (Tipo 2-8) agli e-Gate è:", opts: ["I Diretti colpiscono il sensore con tratti falsi", "Gli Indiretti colpiscono il sensore, i Diretti il software", "I Diretti sono sempre più pericolosi degli Indiretti", "Non esiste alcuna differenza nel framework di classificazione"], ans: 0, expl: "Diretti (Tipo 1) = spoofing al sensore. Indiretti (Tipo 2-8) = intercettazione canali, manipolazione moduli, corruzione DB.", cat: "ATK"},
{q: "Le minacce principali ai sistemi di verifica vocale (ASV) sono:", opts: ["Solo replay e voice conversion, senza contare la sintesi vocale TTS", "Esclusivamente imitazione umana e sintesi vocale text-to-speech", "Imitazione, replay, voice conversion e sintesi vocale (TTS)", "Solo imitazione (mimicry) e replay di registrazioni audio preesistenti"], ans: 2, expl: "Quattro: Imitazione, Replay, Voice Conversion, TTS. Vall-E (Microsoft) clona una voce con 3 secondi di audio.", cat: "VOCE"},
{q: "La Gait Recognition identifica una persona tramite:", opts: ["La temperatura corporea rilevata durante il movimento", "L'impronta digitale acquisita durante la camminata", "Il modo di camminare (silhouette, ritmo del passo, oscillazione braccia)", "L'analisi dei pattern di pressione plantare tramite solette sensorizzate"], ans: 2, expl: "Statico (silhouette, proporzioni) e Dinamico (cinematica). Utile quando il volto non è visibile.", cat: "IMPR"},
{q: "Nella firma dinamica (online), il Dynamic Time Warping (DTW) è necessario perché:", opts: ["Due firme della stessa persona possono avere velocità e ritmi locali diversi pur essendo autentiche", "Le firme tendono a dilatarsi o restringersi globalmente a seconda dello spazio disponibile sulla tavoletta", "La firma è un tratto fisiologico invariante e il DTW compensa solo le differenze di risoluzione del sensore", "Il DTW elimina il rumore ad alta frequenza introdotto dal digitalizzatore hardware durante l'acquisizione"], ans: 0, expl: "La firma varia in velocità e ritmo locale ad ogni esecuzione. Il DTW allinea temporalmente due sequenze con velocità diverse.", cat: "VOCE"},
{q: "Una firma dinamica acquisisce, oltre alla forma grafica:", opts: ["La postura complessiva della mano e del polso rispetto al piano della tavoletta grafica", "Esclusivamente la traiettoria spaziale 2D e la sequenza dei tratti nell'ordine di esecuzione", "Parametri temporali come velocità, accelerazione, inclinazione e pressione della penna nel tempo", "Le coordinate 3D della punta della penna ricostruite tramite sensori inerziali integrati nello stilo"], ans: 2, expl: "La firma online cattura velocità, accelerazione, inclinazione, pressione, tempo — tutti nel dominio temporale. Molto più ricca della offline.", cat: "VOCE"},
{q: "Nella firma offline, tecniche come Extended Shadow Code e Adaptive SIFT-SURF servono per:", opts: ["Acquisire la firma in tempo reale dalla tavoletta grafica durante la sessione", "Cifrare il template della firma per garantire la protezione della privacy", "Estrarre feature discriminanti dall'immagine statica della firma", "Convertire la firma offline in una sequenza temporale equivalente alla firma online"], ans: 2, expl: "La firma offline ha solo l'immagine statica: servono tecniche di estrazione feature visive per il matching.", cat: "VOCE"},
{q: "Voce, mano e firma come tratti biometrici condividono:", opts: ["Alta resistenza allo spoofing grazie alla componente comportamentale difficile da replicare", "Elevata permanenza nel tempo, comparabile a quella dell'iride e delle impronte digitali", "Alta unicità inter-individuale, sufficiente per l'identificazione 1:N anche su database nazionali", "Bassa unicità e permanenza relativa, adatti principalmente ad autenticazione 1:1 o 1:N con N piccolo"], ans: 3, expl: "Sono tratti con discriminatività inferiore a iride/impronta. Adatti a verifica o identificazione su piccola scala, non 1:N con milioni.", cat: "ATK"},
{q: "La differenza tra identity claim esplicita e implicita è:", opts: ["Non esiste alcuna differenza nel framework biometrico", "L'implicita richiede sempre un documento d'identità", "L'esplicita usa la biometria, l'implicita usa le password", "Nell'esplicita l'utente dichiara la propria identità"], ans: 3, expl: "Esplicita: l'utente fornisce attivamente un identificatore. Implicita: il sistema deduce l'identità senza dichiarazione (es. riconoscimento facciale passivo).", cat: "VOLTO"},
{q: "Un 'zero-effort impostor attempt' è:", opts: ["Un tentativo in cui un impostore casuale presenta il proprio tratto genuino senza tentare di imitare la vittima", "Un tentativo in cui l'impostore presenta un artefatto biometrico generico non personalizzato sulla vittima", "Un tentativo in cui l'impostore sfrutta una vulnerabilità nota del matcher senza presentare alcun tratto", "Un tentativo in cui l'impostore replica il tratto della vittima usando una tecnica di spoofing a basso costo"], ans: 0, expl: "Zero-effort: l'impostore non fa nulla di speciale, presenta semplicemente il proprio tratto. Active impostor: tenta attivamente di imitare/frodare.", cat: "ITT"},
{q: "In un sistema biometrico distribuito, il modulo tipicamente remoto è:", opts: ["Il modulo di decisione", "Il display per l'utente", "Il database dei template e/o il modulo di matching", "Il modulo di Feature Extraction, per scaricare il carico computazionale dai client leggeri"], ans: 2, expl: "In sistemi distribuiti, il matching e il DB sono spesso remoti (server). Il sensore è locale dove si trova l'utente.", cat: "SENS"},
{q: "In un sistema on-card, sulla smart card risiedono:", opts: ["Solo il template, senza capacità di matching", "Template e software di matching solo nel caso specifico Match-on-Card", "Solo il software di matching senza dati biometrici", "Nessun dato biometrico: tutto è nel server centrale"], ans: 0, expl: "Nel sistema on-card generico il template risiede sulla carta; il matching può essere esterno. Quando anche il motore di matching è sulla carta si parla più precisamente di Match-on-Card.", cat: "IMPR"},
{q: "La differenza tra on-card generico e Match-on-Card specifico è:", opts: ["Sono la stessa cosa: entrambi indicano matching e storage sulla carta", "On-card può significare solo storage del template", "On-card è sempre più sicuro del Match-on-Card grazie alla cifratura HW", "Match-on-Card memorizza il template sul server, non sulla carta stessa"], ans: 1, expl: "On-card = termine generico (almeno il template sulla carta). Match-on-Card = il matching engine è ANCHE sulla carta.", cat: "IMPR"},
{q: "La differenza tra 'decision error rates' e 'matching errors' è:", opts: ["Sono sinonimi perfetti", "I decision errors sono sempre inferiori ai matching errors", "I matching errors includono i FTA, i decision errors no", "I matching errors sono algoritmici (FMR/FNMR)"], ans: 3, expl: "Matching errors = errori algoritmici puri (FMR/FNMR). Decision error rates = nel riconoscimento positivo corrispondono a FAR/FRR. FTA e FTE rientrano in una terza categoria separata: image acquisition errors.", cat: "MET1"},
{q: "I sistemi biometrici distribuiti sono comuni nell'identificazione e rari nell'autenticazione perché:", opts: ["L'identificazione 1:N richiede accesso a un database centrale ampio", "L'autenticazione richiede sempre più potenza di calcolo", "Non esiste alcuna correlazione tra architettura e modalità operativa", "L'identificazione è sempre più veloce dell'autenticazione"], ans: 0, expl: "1:N necessita del DB completo → tipicamente su server remoto. 1:1 può funzionare con solo il template locale (es. on-card, on-sensor).", cat: "IMPR"},
{q: "Nel modulo di matching, la decisione a soglia (score ≥ T → accetta) fa parte del matching module stesso?", opts: ["No, la decisione è delegata a un modulo esterno che applica policy di sicurezza contestuali", "No, il matching restituisce solo la lista ordinata dei candidati senza confronto con soglia", "Sì, nel modello classico il modulo di matching comprende anche la decisione basata sulla soglia", "No, il matching calcola solo lo score e la decisione è sempre gestita dal sistema operativo"], ans: 2, expl: "Nel modello classico del corso, il modulo di matching include sia il calcolo dello score sia l'algoritmo di decisione, tipicamente il confronto con una soglia.", cat: "MET1"},
{q: "La template selection durante l'enrollment differisce dal template update durante l'autenticazione perché:", opts: ["La selection sceglie i campioni migliori alla registrazione", "Sono la stessa operazione eseguita in momenti diversi", "La selection aggiorna i template, l'update li seleziona", "Nessuna delle due è realmente implementata nei sistemi commerciali"], ans: 0, expl: "Selection = enrollment (scegli i migliori campioni iniziali). Update = uso quotidiano (aggiungi nuovi campioni dopo match ad alta confidenza).", cat: "IDAUT"},
{q: "La variabilità intraclasse rappresenta:", opts: ["La differenza tra tratti biometrici di tipo diverso dello stesso individuo", "La somiglianza tra campioni di persone diverse che causa false accettazioni", "La differenza tra più acquisizioni dello stesso tratto della stessa persona", "La variazione del rumore ambientale che influenza la qualità dell'acquisizione"], ans: 2, expl: "Intraclasse = stessa persona, acquisizioni diverse (rumore, posa, invecchiamento). Interclasse = persone diverse che si somigliano.", sel: true, cat: "SENS"},
{q: "La similitudine interclasse indica:", opts: ["Il livello di correlazione tra le feature estratte da due tratti biometrici diversi della stessa persona", "La variabilità tra acquisizioni dello stesso individuo", "L'elevata somiglianza tra campioni di individui del tutto diversi", "La correlazione tra illuminazione e qualità del template"], ans: 2, expl: "Interclasse = persone diverse ma con tratti simili. Bassa distanza interclasse → difficoltà di discriminazione → più false acceptance.", sel: true, cat: "SENS"},
{q: "Se il Quality Checker valuta un campione come di qualità insufficiente, il sistema deve:", opts: ["Procedere comunque con il matching usando una soglia più bassa", "Terminare la sessione e bloccare l'utente", "Richiedere all'utente una nuova acquisizione", "Memorizzare il campione nel database per futura analisi"], ans: 2, expl: "Se la qualità è insufficiente → riacquisizione. Usare un campione scadente aumenterebbe FMR e FNMR.", cat: "MET1"},
{q: "Il volto è un tratto difficile da riconoscere in modo robusto perché:", opts: ["Subisce forti variazioni per illuminazione, posa, espressione, invecchiamento e occlusioni", "Ha un numero di feature discriminanti troppo elevato per i classificatori lineari standard", "La distanza interclasse è troppo alta e causa un eccesso sistematico di falsi rifiuti", "I sensori RGB richiedono calibrazioni frequenti che degradano la ripetibilità dell'acquisizione"], ans: 0, expl: "Il volto varia enormemente per illuminazione, posa, espressione, invecchiamento, accessori. Alta variabilità intraclasse.", cat: "VOLTO"},
{q: "L'anti-spoofing con dilatazione pupillare è un metodo con:", opts: ["Iride statica e imaging attivo", "Iride dinamica e imaging attivo", "Iride statica e imaging passivo", "Iride dinamica e imaging passivo"], ans: 1, expl: "Dinamica (osserva cambiamento pupilla nel tempo) + imaging attivo (illuminazione variata per provocare la dilatazione).", cat: "ATK"},
{q: "L'analisi FFT di una singola immagine per rilevare pattern Moiré è un metodo con:", opts: ["Iride statica e imaging attivo", "Iride statica e imaging passivo", "Iride dinamica e imaging attivo", "Iride dinamica e imaging passivo"], ans: 1, expl: "Statica (singola immagine) + passivo (nessuno stimolo al soggetto). Le micro-saccadi invece sarebbero dinamiche+passive.", cat: "ATK"},
{q: "La Sicurezza e la Privacy in un sistema biometrico sono:", opts: ["Concetti sovrapposti: la Privacy include autenticazione e la Sicurezza include il consenso", "Concetti distinti: la Sicurezza garantisce autenticazione e integrità", "Concetti complementari: la Sicurezza protegge i dati e la Privacy ne regola l'accesso fisico", "Concetti equivalenti: entrambe mirano a impedire l'accesso non autorizzato al template"], ans: 1, expl: "Sicurezza = autenticazione, integrità, confidenzialità, non ripudio. Privacy = in più: protezione dati personali + controllo/consenso.", cat: "PRIV"},
{q: "Il framework classico degli attacchi biometrici distingue tra:", opts: ["Attacchi diretti al sensore e attacchi indiretti al database", "Attacchi al sistema e attacchi sugli ingressi", "Attacchi cooperativi e attacchi non cooperativi", "Attacchi passivi di intercettazione e attacchi attivi di iniezione"], ans: 1, expl: "Due pilastri: attacchi al sistema (DoS, manomissione HW, violazione rete) e attacchi sugli ingressi (spoofing/PAD, adversarial).", cat: "ATK"},
{q: "Qual è la differenza tra un 'genuine attempt' e un 'impostor attempt'?", opts: ["Il genuine è più lento dell'impostor", "L'autenticazione è intrinsecamente più vulnerabile agli attacchi di spoofing su rete pubblica", "Sono la stessa cosa: entrambi sono tentativi legittimi", "Nel genuine l'utente presenta il proprio tratto reale"], ans: 3, expl: "Genuine = utente legittimo che presenta il proprio tratto. Impostor = qualcuno che (intenzionalmente o meno) presenta un tratto che non corrisponde al template.", cat: "ITT"},
{q: "Le tre fasi di test standardizzate per valutare un sistema biometrico sono:", opts: ["Training, Validation, Testing", "Enrollment, Verification, Identification", "Technology, Scenario, Operational", "Accuracy, Speed, Security"], ans: 2, expl: "Technology (algoritmi), Scenario (simulazioni controllate), Operational (valutazione reale sul campo).", sel: true, cat: "IDAUT"},
{q: "Lo Zoo di Doddington: le 'Capre' (Goats) causano:", opts: ["Molti falsi rifiuti a causa di alta variabilità intraclasse", "Nessun problema di riconoscimento", "False accettazioni per somiglianza con altri", "Saturazione del database a causa della continua necessità di template update"], ans: 0, expl: "Pecore = ideali. Capre = molti falsi rifiuti. Agnelli = false accettazioni passive. Lupi = manipolazione attiva.", cat: "ZOO"},
{q: "Nello Zoo di Doddington, gli Agnelli (Lambs) causano false accettazioni perché:", opts: ["Presentano alta variabilità intraclasse che confonde il matcher durante il confronto con la gallery", "Manipolano intenzionalmente il proprio tratto biometrico per impersonare un altro utente registrato", "Hanno un tratto biometrico instabile che produce score molto diversi a ogni acquisizione successiva", "Hanno bassa distanza interclasse naturale, risultando simili ad altri per caso"], ans: 3, expl: "Lamb = naturalmente simile ad altri → false acceptance senza intenzione fraudolenta. I Lupi invece frodano attivamente.", cat: "ZOO"},
{q: "Nello Zoo di Doddington, i Lupi (Wolves):", opts: ["Hanno bassa variabilità intraclasse", "Manipolano intenzionalmente il tratto per frodare il sistema", "Generano molti falsi rifiuti per variabilità", "Sfruttano vulnerabilità del software di matching per forzare un buffer overflow"], ans: 1, expl: "I Lupi manipolano attivamente il tratto (soprattutto comportamentale) per impersonare un altro utente.", cat: "ZOO"},
{q: "Il Rank-1 nella curva CMC indica:", opts: ["La percentuale di volte in cui l'identità corretta è al primo posto della lista", "La probabilità di trovare l'identità corretta tra le prime 5 posizioni", "Il rapporto percentuale tra false accettazioni e tentativi genuini al primo tentativo", "La soglia ottimale per il sistema"], ans: 0, expl: "Rank-1 = identità corretta al primo posto. Rank-5 = tra le prime cinque posizioni.", cat: "MET1"},
{q: "Nella rivendicazione d'identità, la Positiva e la Negativa differiscono perché:", opts: ["Nella Positiva l'utente dichiara di essere registrato", "La Negativa è sempre più veloce della Positiva", "La Positiva usa la biometria, la Negativa le password", "Sono la stessa cosa con nomi diversi"], ans: 0, expl: "Positiva: 'sono nel sistema, fatemi entrare'. Negativa: 'non sono nel sistema, non ho già richiesto questo servizio'.", sel: true, cat: "IDAUT"},
{q: "Il Penetration Rate in un algoritmo di Binning indica:", opts: ["Il tasso di errore del classificatore nella fase iniziale di assegnazione al bin", "La percentuale del database che deve essere scansionata per completare una ricerca", "La velocità di acquisizione del sensore misurata in campioni elaborati al secondo", "Il rapporto tra falsi rifiuti e false accettazioni all'interno di un singolo bin"], ans: 1, expl: "Rate basso = sistema veloce. Si valuta come il rapporto tra confronti necessari e dimensione totale del DB.", cat: "IMPR"},
{q: "Le minutiae più utilizzate nei sistemi automatici di impronte (Livello II) sono:", opts: ["Core e Delta", "Arch, Loop e Whorl", "Terminazioni e biforcazioni", "L'orientamento globale dei ridge e la frequenza spaziale"], ans: 2, expl: "Ne esistono 150+ tipologie, ma i sistemi automatici (FBI) usano principalmente terminazioni e biforcazioni.", cat: "IMPR"},
{q: "Il Crossing Number CN=1 in un'immagine binarizzata di impronta indica:", opts: ["Una biforcazione", "Un punto su un ridge normale", "Un poro sudoriparo isolato dal resto della cresta", "Una terminazione (fine cresta)"], ans: 3, expl: "CN=1 → terminazione. CN=2 → ridge normale (nessuna minutia). CN=3 → biforcazione.", cat: "IMPR"},
{q: "Il Crossing Number CN=2 indica:", opts: ["Un delta, ovvero il punto di divergenza tra tre creste papillari", "Un punto su un ridge normale, non una minutia", "Una minutia complessa formata da due biforcazioni adiacenti sullo stesso ridge", "Una biforcazione, ovvero il punto in cui un ridge si divide in due rami"], ans: 1, expl: "CN=2 = punto su ridge normale, NON è una minutia. Trappola: lo studente potrebbe pensare che ogni CN sia una minutia.", cat: "IMPR"},
{q: "Le tre macro-categorie di classificazione delle impronte al Livello I (globale) sono:", opts: ["Minutia, Ridge, Valley", "Arch, Loop, Whorl", "Core, Delta, Ridge", "Terminazione, Biforcazione, Punto isolato"], ans: 1, expl: "Arch (arco), Loop (cappio), Whorl (vortice). La A è Livello II.", cat: "IMPR"},
{q: "Il Livello III dell'impronta (pori, conformazioni intra-cresta) richiede una risoluzione minima di:", opts: ["Qualsiasi risoluzione è sufficiente", "1000 DPI", "500 DPI", "250 DPI"], ans: 1, expl: "Dettagli microscopici → sensori ottimi e almeno 1000 DPI. Il 500 DPI è sufficiente per il Livello II (minutiae).", sel: true, cat: "IMPR"},
{q: "Il Quality Checker nel flusso biometrico si posiziona:", opts: ["Subito dopo l'acquisizione, per verificare la bontà del campione prima dell'estrazione delle feature", "Tra l'estrazione delle feature e il matching, per filtrare i vettori con entropia insufficiente", "Prima dell'acquisizione, per calibrare automaticamente i parametri del sensore sul soggetto", "Dopo il matching, per scartare gli score generati da campioni con rapporto segnale/rumore basso"], ans: 0, expl: "Il Quality Checker valuta il campione appena acquisito. Se la qualità è insufficiente → riacquisizione.", cat: "SENS"},
{q: "Secondo il materiale del corso, la differenza tra identificazione positiva e negativa è:", opts: ["La positiva verifica l'appartenenza a una lista di abilitati, la negativa controlla che il soggetto non sia in blacklist o non usi identità multiple", "La positiva confronta il campione con un singolo template dichiarato in modalità 1:1, la negativa confronta con l'intero database in modalità 1:N", "La negativa usa sempre database di dimensioni ridotte rispetto alla positiva per velocizzare la ricerca tramite binning gerarchico", "Non esiste alcuna differenza operativa tra le due: sono nomi intercambiabili per lo stesso processo di confronto biometrico 1:N"], ans: 0, expl: "Nel corso, identificazione positiva e negativa sono due usi diversi dell'identificazione. La conferma di un'identità dichiarata ('sei chi dici?') appartiene invece all'autenticazione/verifica 1:1, come nell'esempio del bancomat.", cat: "IMPR"},
{q: "Nel sistema biometrico, il 'Genuino' e l''Impostore' si distinguono perché:", opts: ["Sono entrambi utenti autorizzati con livelli di accesso diversi", "Il genuino è l'utente legittimo", "Il genuino usa password, l'impostore usa biometria", "Non esiste una distinzione formale nel framework biometrico"], ans: 1, expl: "Genuino = utente con i requisiti per accedere. Impostore = utente non autorizzato.", cat: "ITT"},
{q: "La regola di decisione fondamentale in un sistema di verifica biometrica è:", opts: ["Se il match score è positivo, accetta; se negativo, rifiuta", "Se il match score S ≥ soglia T, accetta come genuino", "Il sistema accetta sempre e registra gli score per analisi offline", "Se l'immagine è a fuoco, accetta; se sfocata, rifiuta"], ans: 1, expl: "Score ≥ T → Genuino (accettato). Score < T → Impostore (rifiutato). La soglia T determina il bilanciamento FMR/FNMR.", cat: "MET1"},
{q: "Un template biometrico è:", opts: ["L'immagine grezza del tratto biometrico memorizzata nel database dopo la compressione", "Il vettore dei pesi della rete neurale addestrata specificamente sul tratto dell'utente", "La rappresentazione matematica sintetica delle feature estratte dal dato biometrico", "L'insieme dei parametri di calibrazione del sensore associati a ciascun utente registrato"], ans: 2, expl: "Template = rappresentazione compatta e matematica (es. IrisCode, coordinate minuzie). Non è l'immagine grezza.", cat: "IRIDE"},
{q: "Le due macro-fasi operative di un sistema biometrico sono:", opts: ["Input dei dati grezzi e Output della decisione finale del sistema", "Training del modello di matching e Testing sulle nuove acquisizioni", "Estrazione delle feature e classificazione vettoriale nello spazio latente", "Enrollment (registrazione) e Riconoscimento (matching + decisione)"], ans: 3, expl: "Enrollment = registrazione iniziale con salvataggio in galleria. Riconoscimento = acquisizione probe + matching + decisione.", cat: "IDAUT"},
{q: "I 4 moduli di un sistema biometrico completo sono:", opts: ["Sensore, Estrazione Feature, Matcher, Decisione", "Sensore, Quality Checker, Matcher, Database", "Acquisizione, Normalizzazione, Classificatore, Logger", "Enrollment, Estrazione Feature, Matching, Logging"], ans: 0, expl: "Sensore (acquisizione) → Feature Extraction → Matcher (confronto probe/gallery) → Decisione (score vs soglia).", cat: "MULTI"},
{q: "L'architettura Match-on-Sensor (Match-in-Sensor) si distingue perché:", opts: ["Il sensore acquisisce e trasmette il template cifrato al microcontrollore host per il matching sicuro", "Il template risiede nel Secure Element della smart card e il sensore esegue solo l'acquisizione grezza", "Il matching avviene nel server remoto ma il sensore esegue localmente l'estrazione delle feature e il QC", "Il matching avviene localmente nel sensore, riducendo l'esposizione dei dati biometrici verso l'esterno"], ans: 3, expl: "Nel Match-in-Sensor il confronto biometrico viene eseguito nel sensore stesso. Non è corretto far dipendere la definizione dal fatto che anche crittografia e anti-spoofing avvengano sempre tutti internamente.", cat: "ITT"},
{q: "La variabilità intraclasse è causata da fattori come:", opts: ["Somiglianza morfologica tra individui diversi della stessa etnia o fascia d'età", "Invecchiamento, diversa posa, rumore del sensore e variazioni ambientali", "Variazioni sistematiche introdotte dalla calibrazione periodica del sensore", "Differenze nella risoluzione e nel tipo di compressione dei template nel database"], ans: 1, expl: "Intraclasse = stessa persona in acquisizioni diverse. Causata da invecchiamento, posa, rumore, ambiente.", sel: true, cat: "SENS"},
{q: "I punti di forza dell'impronta digitale come tratto biometrico includono:", opts: ["Assoluta stabilità nel tempo e immunità alle alterazioni dovute a lavori manuali usura", "Alta accuratezza, facilità di acquisizione, tecnologia matura e possibilità di usare più dita", "Minima variabilità intraclasse e impossibilità totale di acquisizione latente", "Uso di fotocamere commerciali RGB a basso costo invece di sensori ottici dedicati"], ans: 1, expl: "Quattro punti di forza. Debolezza principale: ~4% della popolazione non fornisce impronte leggibili.", cat: "POP"},
{q: "Le debolezze dell'impronta digitale includono il fatto che circa il 4% della popolazione:", opts: ["Ha creste papillari con orientamento troppo uniforme per il classificatore", "Presenta impronte con frequenza di ridge fuori dal range dei sensori standard", "Genera template con entropia insufficiente per un matching discriminativo", "Non riesce a fornire un'impronta leggibile"], ans: 3, expl: "Il 4% non può fornire impronte leggibili (FTE). Inoltre: possibile degrado nel tempo e disagio psicologico (associazione forense).", cat: "POP"},
{q: "I principali punti di forza dell'iride come tratto biometrico sono:", opts: ["Massima accuratezza dopo il DNA, altissima stabilità nel tempo e acquisizione contactless", "Robustezza totale allo spoofing e nessuna occlusione", "Acquisizione sempre cooperativa che elimina il problema dei falsi rifiuti e dello spoofing", "Facilità di acquisizione e alta velocità di matching"], ans: 0, expl: "Iride = tratto più accurato dopo DNA. Pattern stabili dal secondo anno di età. Contactless. Ma: percepita come invasiva.", cat: "ATK"},
{q: "Le principali sfide dell'acquisizione dell'iride includono:", opts: ["Target piccolo (~1 cm), in movimento, dietro cornea curva e bagnata, spesso occluso da ciglia/palpebre", "L'altissima variabilità strutturale dell'iride durante i periodi di forte stress emotivo", "La necessità di usare potenti laser NIR che possono danneggiare la retina se non calibrati", "L'impossibilità di distinguere la texture iridea dai riflessi ambientali sulla cornea in luce NIR"], ans: 0, expl: "L'iride è piccola, in movimento, dietro la cornea. Deformazione elastica con dilatazione pupillare. Percepita come invasiva.", cat: "ATK"},
{q: "La privacy dell'iride ad alta risoluzione è a rischio perché:", opts: ["Fotocamere ad altissima risoluzione possono catturare la texture dell'iride da foto pubbliche o a grande distanza", "L'IrisCode contiene nativamente informazioni genetiche decodificabili sulla salute dell'individuo", "I sensori NIR moderni salvano automaticamente i dati biometrici su database governativi centralizzati", "La crittografia omomorfica usata per l'IrisCode è stata recentemente bucata dai computer quantistici"], ans: 0, expl: "Foto ad alta risoluzione (selfie, social) → texture iride catturabile nel visibile anche a distanza → rischio di tracking non consenziente.", cat: "ITT"},
{q: "Le caratteristiche hardware minime di un sensore per l'iride includono:", opts: ["Un sensore CCD monocromatico IR con risoluzione minima 640×480 e raggio iride di 70-140 pixel", "Un sensore CCD monocromatico IR con risoluzione minima 320×240 e raggio iride di 30-50 pixel", "Un sensore CMOS RGB con risoluzione minima 1280×720 e raggio iride di 200-300 pixel", "Un sensore CCD monocromatico IR con risoluzione minima 1920×1080 e raggio iride di 150-200 pixel"], ans: 0, expl: "CCD monocromatico sensibile IR. Risoluzione minima 640×480. Raggio iride almeno 70-140 pixel. Ottiche variabili/motorizzate.", cat: "IRIDE"},
{q: "I filtri ottici (es. passa-banda) nei sensori biometrici servono per:", opts: ["Aumentare la risoluzione spaziale del sensore filtrando le frequenze spaziali più basse", "Aumentare il contrasto dei micro-dettagli della pelle tramite polarizzazione della luce incidente", "Bloccare le lunghezze d'onda indesiderate, ad es. la luce solare in un sistema IR per iride", "Ridurre il consumo energetico del sensore limitando la quantità di fotoni che raggiungono il chip"], ans: 2, expl: "Es. in un sistema iride: il filtro fa passare solo l'IR, bloccando la luce visibile che causerebbe riflessi sulla cornea.", cat: "IRIDE"},
{q: "Come si classificano le vulnerabilità degli e-Gate?", opts: ["Non esiste una classificazione standard", "Solo in base alla nazionalità dell'attaccante", "In attacchi Diretti e Indiretti", "Solo in base al costo dell'attacco"], ans: 2, expl: "Diretti = presentazione di tratti falsi al sensore. Indiretti = conoscenza dell'architettura per intercettare canali interni.", cat: "SENS"},
{q: "La sensibilità ISO in un sensore biometrico influisce sulla qualità perché:", opts: ["ISO bassi riducono il framerate rallentando in modo inaccettabile il throughput del varco", "ISO alti permettono di acquisire al buio ma introducono rumore che degrada le feature biometriche", "La sensibilità ISO non ha alcun effetto sulla biometria", "ISO alti migliorano sempre la qualità dell'immagine senza compromessi"], ans: 1, expl: "ISO alti = più luminosità in condizioni scure ma più rumore elettronico → distrugge micro-dettagli → FNMR aumenta.", cat: "MET1"},
{q: "Secondo il materiale del corso, come si classificano questi errori biometrici?", opts: ["Image acquisition errors = FTA/FTE; matching errors = FMR/FNMR; decision error rates = FAR/FRR nel riconoscimento positivo", "Image acquisition errors = FMR/FNMR; matching errors = FTA/FTE; decision error rates = EER al punto di equilibrio", "Image acquisition errors e matching errors sono categorie equivalenti; i decision errors includono solo i Failure To Enroll", "Image acquisition errors = errori del sensore ottico; matching errors = errori di trasmissione; decision errors = errori umani"], ans: 0, expl: "Il corso distingue le categorie image acquisition errors, matching errors e decision error rates. FTA/FTE appartengono agli errori di acquisizione; FMR/FNMR agli errori di matching; FAR/FRR sono i nomi usati nel riconoscimento positivo per i tassi di decisione alla soglia.", cat: "MET1"},
{q: "Nella classificazione globale delle impronte (Livello I), Core e Delta sono:", opts: ["Tipi di pori sudoripari visibili solo al Livello III con risoluzione ≥1000 DPI", "Tipi di minutiae locali estratte al Livello II (terminazioni e biforcazioni)", "Zone danneggiate in cui il rumore ha distrutto le creste rendendo impossibile l'estrazione", "Punti singolari che determinano la classificazione in Arch, Loop e Whorl"], ans: 3, expl: "Core = centro del pattern. Delta = punto di divergenza. La loro presenza e posizione determinano Arch/Loop/Whorl.", cat: "IMPR"},
{q: "Il matching basato sulle minutiae è complesso a causa di:", opts: ["Rotazioni, traslazioni, distorsioni elastiche della pelle e minutiae falsamente rilevate o mancanti", "La natura puramente analogica dei sensori capacitivi moderni che introduce rumore termico", "L'impossibilità di estrarre minutiae da immagini digitali", "L'impossibilità di usare algoritmi euristici per allineare rapidamente template di dimensioni diverse"], ans: 0, expl: "La corrispondenza richiede tolleranza su distanza spaziale e angolo di direzione, compensando deformazioni e artefatti.", cat: "IMPR"},
{q: "Il vantaggio principale del calcolo degli score Offline rispetto all'Online è:", opts: ["Permette di generare un numero enorme di confronti impostori senza coinvolgere continuamente gli utenti", "Offre maggiore sicurezza impedendo agli attaccanti di intercettare il template durante l'uso", "Non richiede alcuna memorizzazione dei dati biometrici, garantendo la privacy by design", "Elimina la necessità di calibrare la soglia operativa del sistema in base allo scenario d'uso"], ans: 0, expl: "Offline = salvi le immagini → confronto esaustivo successivo → molti più confronti impostori per statistiche affidabili.", cat: "MET1"},
{q: "Nel contesto della firma biometrica, la differenza tra firma online (dinamica) e offline (statica) è:", opts: ["Non c'è alcuna differenza pratica", "L'offline è sempre più accurata dell'online", "L'online acquisisce la sequenza temporale (velocità, pressione, inclinazione)", "L'online richiede algoritmi Deep Learning, mentre l'offline si basa esclusivamente su filtri matematici classici"], ans: 2, expl: "Online = tavoletta grafica che cattura tutto il dominio temporale. Offline = solo l'immagine finale della firma (meno informativa).", cat: "VOCE"},
{q: "Il matching basato sulle minutiae è complesso a causa di problematiche legate a:", opts: ["Il numero estremamente ridotto di minutiae presenti nelle impronte della maggior parte della popolazione", "Rotazioni, traslazioni, distorsioni elastiche della pelle e minutiae falsamente rilevate", "La necessità di ricostruire l'impronta 3D completa prima di procedere al confronto vettoriale", "La limitata potenza di calcolo dei microcontrollori inseriti nelle moderne smart card biometriche"], ans: 1, expl: "Il matching deve tollerare rotazioni, traslazioni, distorsioni elastiche e minutiae spurie o mancanti.", cat: "POP"},
{q: "Le tecniche utilizzate per migliorare il flusso nel processing biometrico includono:", opts: ["Regressione, Normalizzazione, Convoluzione", "Solo Regressione e Normalizzazione", "Nessuna delle precedenti", "Solo Regressione"], ans: 0, expl: "Nel flusso biometrico, regressione (ricostruzione dati mancanti), normalizzazione (uniformare contrasto/illuminazione) e convoluzione (filtraggio spaziale) sono tutte tecniche di processing.", sel: true, cat: "CNN"},
{q: "Il False Non-Match è classificato come errore di:", opts: ["Tipo II, mancato allarme", "Tipo I, falso allarme", "Tipo III, errore di classificazione", "Nessun tipo standard, dipende dalla soglia operativa"], ans: 1, expl: "False Non-Match (genuino rifiutato) = Tipo I (falso allarme). False Match (impostore accettato) = Tipo II (mancato allarme).", cat: "MET1"},
{q: "La curva CMC è uno strumento di valutazione specifico per:", opts: ["Sistemi di verifica biometrica 1:1 con soglia fissa", "Sistemi di identificazione 1:N, dove misura la probabilità che l'identità corretta sia nei primi K risultati", "La calibrazione della soglia operativa in sistemi multimodali", "La misurazione del Failure To Enroll durante la fase di registrazione"], ans: 1, expl: "CMC = Cumulative Matching Characteristic, per identificazione 1:N. Rank-1 = identità corretta al primo posto. Rank-10 = entro i primi dieci.", sel: true, cat: "MULTI"},
{q: "Quale delle seguenti è una caratteristica della Match-on-Card?", opts: ["Il template e il motore di matching risiedono nel Secure Element della carta", "La carta è alimentata da una batteria interna ricaricabile via NFC", "Il matching avviene nel terminale POS, la carta contiene solo il template", "Tutte le precedenti"], ans: 0, expl: "Nel materiale del corso, il MoC ha: Secure Element (template + motore di matching), Contactless Functionality che alimenta la carta con energia dal terminale — nessuna batteria necessaria. Nessun segreto lascia mai la carta.", sel: true, cat: "IMPR"},
{q: "Nella fusione a livello feature di un sistema multimodale, cosa viene combinato?", opts: ["I vettori di feature estratti dai diversi tratti prima del matching", "Gli score numerici prodotti dai singoli matcher dopo il confronto", "Le decisioni binarie accetta/rifiuta di ciascun sottosistema", "Le immagini grezze acquisite dai sensori prima dell'estrazione"], ans: 0, expl: "Fusione a livello feature = combinazione vettori prima del matching. Livello score = score post-matching. Livello decisione = decisioni binarie. Livello sensore = dati grezzi.", cat: "MULTI"},
{q: "Nello Zoo di Doddington, le Goats sono utenti che generano un alto tasso di:", opts: ["False acceptance, perché il loro tratto è naturalmente simile a quello di altri", "False rejection, perché il loro tratto ha alta variabilità tra acquisizioni", "Spoofing, perché il loro tratto è facile da replicare con artefatti", "Failure to enroll, perché il sensore non riesce ad acquisire il loro tratto"], ans: 1, expl: "Goats = alta variabilità intraclasse → false rejection. Lambs = bassa distanza interclasse → false acceptance. Wolves = manipolazione attiva.", sel: true, cat: "ZOO"},
