{q: "In un'immagine binarizzata e scheletrizzata di un'impronta, un pixel nero è circondato da 7 pixel bianchi nel suo intorno 3×3. Questo corrisponde a:", opts: ["Un punto su un ridge normale", "Una biforcazione", "Una terminazione di cresta", "Un punto di massima curvatura del ridge"], ans: 2, expl: "In un intorno 3×3, un pixel nero con 7 bianchi significa un solo vicino nero → CN=1 → terminazione. CN=2 = ridge normale, CN=3 = biforcazione.", sel: true, cat: "IMPR"},
{q: "In un filtraggio adattivo contestuale applicato alle impronte, il filtro:", opts: ["Usa parametri fissi calcolati una volta sull'intera immagine e poi applicati uniformemente", "Stima parametri locali da porzioni dell'immagine e adatta la maschera in base ad essi", "Applica una soglia globale di binarizzazione prima dell'estrazione delle minutiae", "Esegue un'equalizzazione dell'istogramma seguita da un filtro mediano fisso"], ans: 1, expl: "Il filtraggio adattivo contestuale stima parametri locali (orientamento e frequenza dei ridge) e adatta i parametri del filtro (es. Gabor) zona per zona.", sel: true, cat: "IMPR"},
{q: "Il FNMR alla soglia T si calcola come:", opts: ["FNMT / Totale confronti genuini", "FNMT / Totale confronti impostori", "FNMT × FMR / 100", "1 − FMR(T)"], ans: 0, expl: "FNMR(T) = numero di false non-match alla soglia T diviso il totale dei confronti genuini. Non è il complemento di FMR, sono calcolati su popolazioni diverse.", sel: true, cat: "POP"},
{q: "Il FMR alla soglia T si calcola come:", opts: ["FM(T) diviso il totale dei confronti genuini", "FM(T) moltiplicato per il totale degli impostori", "FM(T) diviso il totale dei confronti impostori", "FM(T) sommato al totale dei confronti genuini"], ans: 2, expl: "FMR(T) = numero di false match alla soglia T diviso il totale dei confronti impostori. Il denominatore sono gli impostori, non i genuini.", sel: true, cat: "MET1"},
{q: "Nella ISO/IEC 19795, la valutazione di tipo Technology consiste in:", opts: ["Installare il sistema nell'applicazione finale e testarlo con utenti reali che firmano un consenso", "Usare database pubblici di campioni biometrici per effettuare test algoritmici offline", "Allestire stanze attrezzate con diverse tecnologie e testarle con un gruppo ristretto di volontari", "Lanciare un appalto ai produttori per valutare le offerte economiche più competitive"], ans: 1, expl: "Technology = test algoritmici su database pubblici. Scenario = stanze attrezzate con volontari. Operational = sistema installato nell'applicazione finale con utenti reali.", sel: true, cat: "VOCE"},
{q: "Nella curva DET, le applicazioni forensi nelle fasi iniziali di indagine si posizionano nella regione:", opts: ["Basso FNMR e alto FMR", "Alto FNMR e basso FMR", "FNMR e FMR entrambi medi, vicino all'EER", "FNMR e FMR entrambi bassi, vicino all'origine"], ans: 0, expl: "In forense non si vuole perdere nessun sospetto (FNMR basso). Si accettano molti falsi match (FMR alto) che l'esperto filtra manualmente.", sel: true, cat: "MET1"},
{q: "Avendo M=2 immagini per individuo e N=100 individui, il numero di comparazioni genuine possibili è:", opts: ["200", "100", "400", "Non è possibile realizzare comparazioni genuine con solo 2 immagini"], ans: 1, expl: "Le comparazioni genuine confrontano immagini della stessa persona. Per calcolarle: prendi M immagini di un individuo e conta le coppie possibili con C(M,2). Esempio con M=4: le coppie sono 1-2, 1-3, 1-4, 2-3, 2-4, 3-4 = 6 coppie. Se hai N=100 individui con M=4, il totale genuine è 6 × 100 = 600. Nel nostro caso M=2: le coppie per persona sono C(2,2)=1 (solo la coppia 1-2). Quindi con N=100: 1 × 100 = 100 comparazioni genuine.", sel: true, cat: "MET1"},
{q: "Le distribuzioni di Bernoulli sono utili per descrivere gli errori nei sistemi biometrici di autenticazione e identificazione:", opts: ["Falso, si applicano solo ai sistemi di identificazione 1:N", "Falso, si usano solo per modellare il Failure To Enroll", "Vero, descrivono la probabilità di errore per singolo confronto", "Vero, ma solo se il sistema opera alla soglia EER"], ans: 2, expl: "Il processo di Bernoulli B(n,p) modella gli errori sia in autenticazione sia in identificazione: ogni confronto ha probabilità p di errore.", sel: true, cat: "CNN"},
{q: "La relazione tra la curva ROC e la curva DET è:", opts: ["ROC è il complemento aritmetico di DET, quindi ROC = 1 − DET", "Non esiste alcuna relazione matematica tra le due curve", "Contengono le stesse informazioni con rappresentazione grafica diversa", "ROC è più informativa perché include anche il tasso di Failure To Enroll"], ans: 2, expl: "ROC e DET mostrano le stesse informazioni (FMR vs FNMR) con rappresentazioni grafiche diverse. La DET usa scala logaritmica/deviazione normale, la ROC scala lineare.", sel: true, cat: "MET1"},
{q: "La skew nel contesto del rolling shutter è:", opts: ["L'immagine si piega in diagonale quando fotocamera o soggetto si spostano lateralmente", "I pixel verticali vengono campionati violando il teorema del campionamento per movimento troppo rapido", "L'immagine presenta bande orizzontali di luminosità alternata causate da luce fluorescente", "L'immagine risulta sfocata uniformemente per vibrazione ad alta frequenza del sensore"], ans: 0, expl: "La skew è la storta: l'immagine si inclina in diagonale perché righe successive vengono lette in momenti diversi mentre il soggetto o la camera si muovono lateralmente.", sel: true, cat: "SENS"},
{q: "Quale applicazione di sicurezza richiede il frame rate più elevato nel sistema di visione?", opts: ["Monitoraggio di un parcheggio per rilevare veicoli in sosta", "Riconoscimento facciale di persone in coda a un varco", "Lettura delle targhe di veicoli in transito in videosorveglianza", "Controllo accessi biometrico con impronta a contatto"], ans: 2, expl: "La lettura targhe richiede il frame rate più alto perché i veicoli passano a velocità elevata e il sistema deve catturare un'immagine nitida della targa in movimento.", sel: true, cat: "IMPR"},
{q: "Il Moiré pattern in un sensore biometrico si verifica quando:", opts: ["La scena contiene dettagli ripetitivi che superano la risoluzione del sensore causando artefatti visivi", "Il flash si attiva solo per una parte del tempo di esposizione creando bande di illuminazione", "Il sensore satura per sovraesposizione creando aloni bianchi attorno ai bordi dell'oggetto", "La lente introduce distorsione radiale ai bordi dell'immagine deformando le linee rette"], ans: 0, expl: "Il Moiré è un artefatto che si genera quando pattern ripetitivi nella scena (linee, griglie) hanno frequenza spaziale vicina o superiore alla risoluzione del sensore.", sel: true, cat: "MET2"},
{q: "I sistemi Match-on-Card per impronte su smart card sono ancora in fase di prototipazione e non disponibili commercialmente:", opts: ["Vero, nessun sistema MoC è ancora certificato per l'uso commerciale", "Vero, la tecnologia esiste ma le card non supportano il matching on-board", "Falso, sono già presenti sul mercato in programmi come Mastercard Biometric Checkout", "Falso, ma solo per applicazioni governative e non per pagamenti commerciali"], ans: 2, expl: "Il materiale del corso presenta il programma Mastercard Global Biometric Checkout con sensori ultrasottili, Secure Element e contactless. Sono già sul mercato.", sel: true, cat: "IMPR"},
{q: "Il sistema AFIS italiano realizza funzioni di identificazione:", opts: ["Solo preventiva, per il controllo dei precedenti penali", "Solo giudiziaria, per la raccolta delle prove in tribunale", "Sia preventiva sia giudiziaria, coprendo entrambi gli ambiti", "Né preventiva né giudiziaria, solo per il rilascio dei documenti"], ans: 2, expl: "L'AFIS italiano svolge sia funzione preventiva (schedatura, controllo precedenti) sia giudiziaria (identificazione da tracce sulla scena del crimine).", sel: true, cat: "IMPR"},
{q: "Su un sensore CMOS, un'illuminazione improvvisa o sfarfallante causa principalmente:", opts: ["Spatial aliasing per battimento tra griglia pixel e pattern della scena", "Temporal aliasing perché la luce varia a frequenza simile al frame rate del sensore", "Wobble/jello effect per deformazione geometrica dell'immagine", "Moiré pattern per interferenza tra frequenze spaziali della scena e del sensore"], ans: 1, expl: "Luce fluorescente o flash parziale durante l'esposizione rolling shutter → temporal aliasing. Lo spatial aliasing è un problema spaziale (griglia pixel vs pattern scena).", sel: true, cat: "SENS"},
{q: "Un sistema AFIS nazionale tipicamente contiene immagini dell'iride:", opts: ["Vero, i sistemi AFIS moderni integrano sia impronte sia iridi nello stesso database", "Vero, ma solo per i soggetti classificati ad alto rischio di recidiva criminale", "Falso, l'AFIS contiene esclusivamente dati relativi alle impronte digitali", "Falso, l'AFIS contiene impronte e volti ma non iridi né altre biometrie"], ans: 2, expl: "AFIS = Automated Fingerprint Identification System. Contiene impronte digitali, non immagini iridee. L'iride è gestita da sistemi separati.", sel: true, cat: "IRIDE"},
{q: "Le feature biometriche estratte dalla voce per l'identificazione vengono tipicamente ricavate:", opts: ["Analizzando l'energia del segnale in particolari bande dello spettro sonoro", "Misurando la frequenza fondamentale e solo quella del parlato continuo", "Confrontando la forma d'onda grezza con un database di template audio campione", "Estraendo le pause tra le parole e la velocità di eloquio come unici parametri"], ans: 0, expl: "Le feature vocali (es. MFCC) analizzano l'energia in bande specifiche dello spettro, catturando le caratteristiche del tratto vocale del parlante.", sel: true, cat: "VOCE"},
{q: "La tecnica di Direct Gray Extraction si applica:", opts: ["Solo a immagini di impronte digitali a colori per separare i canali cromatici", "A tutte le biometrie basate su immagini per la normalizzazione del contrasto", "Alle impronte digitali in toni di grigio per estrarre le minutiae direttamente", "Solo alle immagini binarizzate dopo la fase di scheletrizzazione"], ans: 2, expl: "La Direct Gray Extraction lavora direttamente sull'immagine in scala di grigi dell'impronta per trovare le minutiae, senza passare per binarizzazione e scheletrizzazione.", sel: true, cat: "IMPR"},
{q: "Per una maggiore nitidezza dei ridge di palmi e impronte senza contatto, la luce più efficace è:", opts: ["Luce verde a banda stretta", "Luce infrarossa NIR standard", "Luce ultravioletta a onda corta", "Luce bianca a banda larga"], ans: 0, expl: "La luce verde aumenta il contrasto dei ridge nelle acquisizioni contactless perché viene assorbita in modo diverso dalla pelle nelle zone di cresta rispetto alle valli.", sel: true, cat: "IMPR"},
{q: "Un sistema di videosorveglianza aeroportuale controlla se un individuo appartiene a una lista di persone potenzialmente terroriste. Si tratta di:", opts: ["Autenticazione positiva", "Identificazione positiva", "Identificazione negativa", "Autenticazione negativa"], ans: 1, expl: "Il sistema confronta il volto con una watchlist per verificare se la persona è tra i soggetti ricercati → identificazione positiva 1:N.", sel: true, cat: "VOLTO"},
{q: "Un dipendente appoggia il dito su un lettore e dichiara il proprio ID per accedere al terminale aziendale. Il sistema confronta l'impronta con il template associato a quell'ID. Si tratta di:", opts: ["Identificazione positiva 1:N", "Autenticazione 1:1", "Identificazione negativa", "Screening biometrico passivo"], ans: 1, expl: "L'utente dichiara la propria identità (identity claim) e il sistema verifica confrontando 1:1 con il template associato. È autenticazione/verifica.", sel: true, cat: "IMPR"},
{q: "La Regola del 3 in biometria stabilisce che per affermare con il 95% di confidenza che il tasso di errore è inferiore a p, servono almeno:", opts: ["3/p test indipendenti", "3×p test indipendenti", "30/p test indipendenti", "p/3 test indipendenti"], ans: 0, expl: "Regola del 3: N ≥ 3/p per stimare un tasso p con confidenza 95%. Per stimare un FAR di 10⁻⁶ servono almeno 3.000.000 di confronti impostori.", cat: "MET1"},
{q: "La distanza di Hamming tra due IrisCode A e B con maschere MA e MB si calcola come:", opts: ["(A XOR B) AND MA AND MB, diviso il numero di bit dove entrambe le maschere valgono 1", "(A AND B) diviso il numero totale di bit di A", "(A XOR B) diviso il numero totale di bit di A senza considerare le maschere", "(A OR B) AND MA AND MB, diviso il numero di bit dove almeno una maschera vale 1"], ans: 0, expl: "XOR trova i bit diversi tra i due codici. AND con le maschere esclude i bit non validi (occlusioni, riflessi). Si divide per il numero di bit validi in comune (dove entrambe le maschere valgono 1).", sel: true, cat: "IRIDE"},
{q: "Il modulo di quality assessment in un sistema biometrico serve a:", opts: ["Valutare la qualità del campione e decidere se accettarlo o richiederne uno nuovo", "Confrontare il template acquisito con il database e restituire uno score di matching", "Crittografare il template prima della sua memorizzazione permanente nel database centrale", "Normalizzare gli score provenienti da matcher diversi in un sistema biometrico multimodale"], ans: 0, expl: "Il quality checker valuta il campione acquisito (illuminazione, risoluzione, nitidezza, posizione). Se la qualità è sotto soglia, chiede una nuova acquisizione prima di procedere all'estrazione.", cat: "ITT"},
{q: "Un e-Passport conforme agli standard ICAO contiene:", opts: ["Un chip RFID con dati biometrici del titolare accessibili tramite protocolli di sicurezza", "Solo una foto stampata sulla pagina dati senza alcun componente elettronico", "Un sensore di impronte integrato nella copertina per autenticazione on-the-spot", "Una smart card rimovibile con motore di matching biometrico integrato"], ans: 0, expl: "L'e-Passport ICAO contiene un chip RFID con la foto del volto e facoltativamente impronte e iride. L'accesso è protetto da protocolli come BAC/PACE e RBAC/EAC.", cat: "IRIDE"},
{q: "Chiudere il diaframma di un sistema ottico biometrico comporta:", opts: ["Solo un aumento della profondità di campo senza ulteriori effetti sul sistema ottico", "Una riduzione della profondità di campo con miglioramento della nitidezza al centro", "Più profondità di campo, meno luce entrante e riduzione dell'aberrazione sferica", "Solo una riduzione della luce entrante senza effetti sulla profondità di campo acquisita"], ans: 2, expl: "Chiudere il diaframma: 1) aumenta profondità di campo, 2) riduce la luce entrante, 3) riduce l'aberrazione sferica usando solo la parte centrale dell'ottica.", cat: "SENS"},
{q: "Per la videosorveglianza biometrica (es. riconoscimento volto) la focale necessaria è:", opts: ["Molto più corta della VS classica per catturare il maggior numero di soggetti possibile", "Uguale o leggermente maggiore rispetto a un sistema di videosorveglianza classica", "Almeno 200 mm per ottenere un ingrandimento sufficiente del tratto biometrico facciale", "Irrilevante, poiché lo zoom digitale compensa qualsiasi scelta di focale iniziale"], ans: 1, expl: "Un sistema di VS biometrica necessita di una focale uguale o leggermente maggiore rispetto a un normale sistema di VS.", cat: "SENS"},
{q: "La selezione del ROI (Region of Interest) nel sensore migliora le prestazioni perché:", opts: ["Aumenta automaticamente la risoluzione del sensore nell'area selezionata dal sistema", "Attiva l'interpolazione sub-pixel esclusivamente nella regione di interesse selezionata", "Riduce il rumore termico concentrando la dissipazione su un numero minore di fotodiodi", "Riduce i dati da elaborare, aumentando framerate e velocità degli algoritmi di analisi"], ans: 3, expl: "ROI: più framerate, meno errori di processing, algoritmi più veloci. Si parte da sensore CMOS alta risoluzione e si imposta il ROI in base a inquadratura e funzione.", cat: "SENS"},
{q: "Il modello Haar Cascade (Viola-Jones) in biometria viene usato per:", opts: ["La detection di volti nelle immagini come primo passo della catena di elaborazione", "La generazione di template biometrici robusti a variazioni di illuminazione ambientale", "Il riconoscimento dell'identità del soggetto tramite confronto diretto con il database", "La compressione lossy dei template facciali per ridurre lo spazio occupato nel database"], ans: 0, expl: "Haar Cascade (Viola-Jones): modello di ML non-deep per la face detection. È il primo passo nella catena di elaborazione biometrica del volto.", cat: "CNN"},
{q: "Le soft biometrics (altezza, genere, età, colore dei capelli) in un sistema biometrico:", opts: ["Vengono acquisite esclusivamente da sensori dedicati separati dal sistema principale", "Sono utilizzabili solo in sistemi di identificazione negativa e non per la verifica 1:1", "Non possiedono tutte le 7 proprietà ma possono essere usate in aggiunta ai primari", "Possiedono tutte le 7 proprietà del tratto biometrico e possono sostituire i primari"], ans: 2, expl: "Le soft biometrics non possiedono tutte le 7 caratteristiche necessarie ma possono essere usate in aggiunta (genere, colore pelle/capelli/occhi, peso, altezza).", cat: "MULTI"},
{q: "L'integrazione delle soft biometrics nel sistema biometrico avviene correttamente:", opts: ["In sostituzione del modulo di matching primario per ridurre la complessità del sistema", "A valle del modulo biometrico primario, come informazione aggiuntiva allo score", "Esclusivamente a livello di fusione delle feature prima dell'estrazione del template", "A monte del sensore per filtrare i soggetti prima dell'acquisizione del tratto principale"], ans: 1, expl: "L'integrazione corretta delle soft-biometrics è a valle del modulo biometrico primario.", cat: "MULTI"},
{q: "Un vantaggio del gait recognition rispetto ad altri tratti biometrici è che:", opts: ["Raggiunge un'accuratezza superiore al riconoscimento facciale in ogni condizione operativa", "È completamente invariante rispetto all'abbigliamento e alle condizioni fisiche del soggetto", "Non richiede alcun algoritmo di elaborazione essendo direttamente confrontabile visivamente", "Il pattern della camminata si estrae da video acquisibili a distanza con telecamere normali"], ans: 3, expl: "Il gait pattern può essere estratto da frame sequences acquisite a distanza e con telecamere di bassa qualità, estraendo la silhouette dell'individuo.", cat: "SENS"},
{q: "Speech recognition e speaker recognition sono:", opts: ["La stessa tecnologia applicata a contesti operativi diversi con gli stessi algoritmi base", "Due nomi diversi per la stessa funzione di autenticazione vocale biometrica del parlante", "Due task diversi: il primo riconosce cosa viene detto, il secondo chi lo sta dicendo", "Entrambi sistemi di identificazione biometrica basati sulle stesse feature spettrali MFCC"], ans: 2, expl: "Speech Recognition: riconosce ciò che viene detto. Speaker Recognition: riconosce l'identità della persona che parla. Task diversi con metodi diversi.", cat: "VOCE"},
{q: "Esistono sistemi biometrici multimodali integrati su scala nazionale:", opts: ["No, la complessità infrastrutturale li rende irrealizzabili su larga scala attualmente", "Solo in fase prototipale in laboratori di ricerca universitari europei selezionati", "Solo per applicazioni militari e di intelligence con livello di accesso classificato", "Sì, sono stati implementati in diversi paesi per applicazioni di identità civile"], ans: 3, expl: "Esistono sistemi multimodali integrati su scala nazionale per applicazioni di identità civile.", cat: "MULTI"},
{q: "L'impronta contactless (senza contatto) rispetto a quella a contatto:", opts: ["Elimina le deformazioni elastiche e consente l'osservazione di core, ridge e minutiae", "Non permette di osservare alcuna minutia a causa della distanza tra dito e sensore", "Richiede sempre illuminazione a infrarosso lontano per penetrare sotto la superficie", "Produce template incompatibili con i database AFIS esistenti per impronte a contatto"], ans: 0, expl: "L'impronta contactless elimina le deformazioni elastiche del dito. Si possono osservare: core visibile, direzione ridge, fine riga e biforcazioni.", cat: "IMPR"},
{q: "Un sistema AFIS moderno è in grado di raggiungere:", opts: ["Non più di 10.000 comparazioni al secondo per la complessità del matching minutiae", "Circa 100 milioni di comparazioni di impronte al secondo in condizioni operative", "Circa 1 milione di comparazioni di impronte al secondo in condizioni operative", "Velocità variabile dipendente esclusivamente dalla larghezza di banda della rete"], ans: 1, expl: "Un sistema AFIS moderno raggiunge circa 100 milioni di comparazioni al secondo.", cat: "IMPR"},
{q: "I 4 livelli di privacy biometrica descritti nel corso partono da:", opts: ["Template cifrato, template in chiaro, template distribuito, template eliminato dal sistema", "Consenso esplicito, consenso implicito, obbligo legale, interesse vitale dell'utente finale", "Livello hardware, livello software, livello rete, livello utente del sistema biometrico", "Applicazioni privacy-protective fino ad applicazioni che compromettono la privacy"], ans: 3, expl: "4 livelli di privacy biometrica: dal livello 1 (privacy-protective) al livello 4 (applicazioni che compromettono la privacy).", cat: "PRIV"},
{q: "La raccolta dati (data collection) in un sistema biometrico rispetto alla privacy:", opts: ["Non incide sulla privacy se i dati biometrici restano esclusivamente sul dispositivo locale", "Incide sulla privacy dell'utente indipendentemente dalla modalità di memorizzazione", "È neutra dal punto di vista della privacy se il sistema opera in modalità verifica 1:1", "Rappresenta un rischio solo per sistemi con database centralizzati oltre 10.000 utenti"], ans: 1, expl: "La data collection incide sulla privacy dell'utente indipendentemente da come vengono memorizzati i dati.", cat: "PRIV"},
{q: "Nello Zoo di Doddington, le Pecore (Sheep) sono utenti caratterizzati da:", opts: ["Feature molto distintive e bassa variabilità, con bassi tassi sia di FM che di FNM", "Alta variabilità intraclasse che causa numerosi falsi rifiuti al sistema biometrico", "Bassa distanza interclasse che li rende facilmente confondibili con altri utenti registrati", "Capacità di manipolare il tratto biometrico per impersonare attivamente altri soggetti"], ans: 0, expl: "Sheep: utenti con features molto distintive e bassa variabilità intraclasse → bassi FMR e FNMR. Sono gli utenti ideali.", cat: "ZOO"},
{q: "La distribuzione di Sheep, Goats, Lambs e Wolves nella popolazione degli utenti:", opts: ["È uniforme e prevedibile, con percentuali fisse in ogni popolazione biometrica testata", "Dipende esclusivamente dal tipo di sensore utilizzato e non dalla popolazione stessa", "Influenza la dimensione del test necessaria e la stima dell'affidabilità del sistema", "È rilevante solo per sistemi di identificazione e mai per quelli di verifica biometrica"], ans: 2, expl: "La distribuzione di Sheep, Goats, Lambs e Wolves nella popolazione influenza la dimensione del test necessaria e la stima dell'affidabilità.", cat: "ZOO"},
{q: "Un sistema di autenticazione biometrica che protegge l'accesso ai dati personali sanitari dell'utente rientra nella categoria:", opts: ["Privacy-invasive, perché raccoglie dati biometrici sensibili senza offrire all'utente alternative meno invasive", "Privacy-neutral, perché non modifica né amplia né restringe i diritti dell'utente sull'accesso ai propri dati personali", "Privacy-sympathetic, perché usa i dati biometrici dell'utente anche per scopi commerciali secondari non dichiarati", "Privacy-protective, perché il sistema tutela l'utente proteggendo le sue informazioni personali"], ans: 3, expl: "Privacy-protective: il sistema usa la biometria a vantaggio dell'utente, proteggendo le sue informazioni personali da accessi non autorizzati.", cat: "PRIV"},
  {q: "Tra le domande fondamentali di progetto sulla privacy in un sistema biometrico, quale è inclusa?", opts: ["Qual è il costo unitario del sensore scelto per la specifica applicazione?", "I dati biometrici saranno trasmessi in chiaro o saranno cifrati durante il transito?", "Quante minutiae contiene mediamente il template dell'impronta nel database?", "Qual è il framerate massimo del sensore scelto in condizioni di scarsa illuminazione?"], ans: 1, expl: "La trasmissione cifrata è una delle 10 domande fondamentali di progetto sulla privacy: il dato biometrico è sensibile e va protetto anche in transito.", cat: "PRIV"},
  {q: "Nel modello 'match-on-card' il confronto biometrico avviene:", opts: ["Sul server centrale che ospita il database centralizzato dei template dell'organizzazione", "Sul PC dell'operatore che riceve sia probe che template in chiaro via rete sicura", "Sul chip della smart card, dove il template di riferimento è memorizzato e il match è eseguito", "Sul sensore stesso, prima che qualsiasi dato lasci il modulo di acquisizione hardware"], ans: 2, expl: "Match-on-card: template e matcher risiedono nel chip della card. I dati biometrici non lasciano mai la smart card.", cat: "PRIV"},
  {q: "Il principale vantaggio di sicurezza del 'match-on-sensor' rispetto al 'match-on-card' è che:", opts: ["Consente database di grandi dimensioni senza limitazioni di storage della card", "Permette aggiornamento remoto del template senza rienrollment fisico dell'utente", "Il template non lascia mai il sensore, riducendo l'esposizione durante la trasmissione", "Supporta matching più veloce grazie all'uso di GPU integrate nel chip del sensore"], ans: 2, expl: "Match-on-sensor: il template rimane fisicamente dentro il sensore, mai trasmesso. Riduce i punti di esposizione rispetto al match-on-card.", cat: "PRIV"},
  {q: "La 'Rule of 3' nella valutazione biometrica afferma che, se non si osserva nessun errore su N tentativi, il limite superiore dell'intervallo di confidenza al 95% per il tasso di errore reale è:", opts: ["N/3", "3×N", "1/N", "3/N"], ans: 3, expl: "Rule of 3: zero errori osservati ≠ zero errori reali. Con N tentativi e zero errori, il limite superiore al 95% di confidenza è p ≤ 3/N.", cat: "MET1"},
  {q: "La 'Rule of 30' nella valutazione biometrica stabilisce che per stimare in modo statisticamente robusto un tasso di errore p, sono necessari almeno:", opts: ["300 tentativi indipendentemente dal tasso di errore atteso", "30/p tentativi, in modo da osservare almeno 30 errori", "30 soggetti nel campione di test, indipendentemente dal numero di tentativi", "30 acquisizioni per soggetto per ridurre la varianza intraclasse del campione"], ans: 1, expl: "Rule of 30: servono almeno 30/p tentativi, così da osservare statisticamente almeno 30 errori. Esempio: p=1% → 3000 tentativi.", cat: "MET1"},
  {q: "La Cumulative Match Characteristic (CMC) è tipicamente usata per valutare sistemi di:", opts: ["Anti-spoofing, misurando la probabilità di rifiuto degli attacchi nelle prime k acquisizioni", "Enrollment, valutando la qualità del template nelle prime k acquisizioni del sensore", "Verifica 1:1, in sostituzione della curva DET quando si vuole analisi di ranking", "Identificazione closed-set, misurando la probabilità che il genuino sia tra i primi k risultati"], ans: 3, expl: "La CMC misura la probabilità che l'identità corretta compaia tra i primi k candidati restituiti dal sistema di identificazione 1:N closed-set.", cat: "MET2"},
  {q: "L'indice d' (d-prime) misura la separazione tra le distribuzioni dei genuini e degli impostori. La sua limitazione principale è:", opts: ["Non è calcolabile quando il FMR è superiore a 0,5 in condizioni operative reali", "Richiede almeno 10.000 campioni di genuini e 10.000 di impostori per essere significativo", "Assume che entrambe le distribuzioni siano gaussiane con uguale varianza", "Non tiene in alcun modo conto della soglia di decisione adottata dal sistema"], ans: 2, expl: "Il d' assume gaussianità e varianza uguale per le due distribuzioni. Se queste ipotesi non reggono, il valore è fuorviante.", cat: "MET2"},
  {q: "Nella curva DET di un sistema biometrico, la regione 'Security' corrisponde a:", opts: ["Il punto EER dove FMR = FNMR, che rappresenta il bilanciamento ottimale tra sicurezza e convenienza operativa", "La zona con basso FNMR e alto FMR, che massimizza l'accettazione degli utenti legittimi riducendo i falsi rifiuti", "Il punto di massima curvatura della curva DET nel piano log-log, dove si minimizza la somma pesata degli errori", "Basso FMR e alto FNMR, dove la sicurezza è prioritaria rispetto alla comodità utente"], ans: 3, expl: "Regione Security: soglia alta → FMR bassissimo (pochi impostori entrano) a costo di FNMR alto (molti genuini rifiutati).", cat: "MET2"},
  {q: "Analizzare le distribuzioni individuali di similitudine per singolo utente, anziché la sola distribuzione globale, è utile principalmente perché:", opts: ["Riduce il numero di confronti necessari durante la fase di identificazione nel database", "Consente di eliminare la necessità della soglia di decisione globale del sistema", "Evidenzia goats, lambs e wolves non visibili nella distribuzione aggregata del sistema", "Permette di stimare il FMR globale del sistema con maggiore precisione matematica"], ans: 2, expl: "Goats (difficili da riconoscere), lambs (facili da imitare), wolves (imitatori efficaci) emergono solo nelle distribuzioni individuali, non nell'aggregato.", cat: "MET2"},
  {q: "Due sistemi biometrici con la stessa curva DET/ROC possono avere curve CMC diverse perché:", opts: ["La DET usa scala logaritmica mentre la CMC usa scala lineare, distorcendo il confronto", "La CMC viene calcolata su un sottoinsieme casuale del database mentre la DET usa tutto il set", "La CMC dipende dall'ordinamento (ranking) degli score, non solo dai conteggi di errori binari", "La CMC è definita solo per sistemi closed-set mentre la DET vale anche per open-set"], ans: 2, expl: "La DET conta solo errori binari (accetta/rifiuta). La CMC dipende dall'ordinamento degli score: due sistemi con stesso EER possono rankare diversamente.", cat: "MET2"},
  {q: "Una 'Operational Evaluation' secondo ISO 19795 si distingue da una 'Technology Evaluation' perché:", opts: ["Valuta algoritmi in condizioni controllate di laboratorio usando un corpus fisso e noto", "È condotta esclusivamente da laboratori certificati ISO indipendenti dal fornitore del sistema", "Misura esclusivamente le prestazioni hardware del sensore senza coinvolgere il matcher", "Si svolge nel reale contesto di dispiegamento del sistema con utenti reali e condizioni operative"], ans: 3, expl: "Technology Evaluation = laboratorio controllato. Operational Evaluation = campo reale, utenti reali, condizioni operative vere.", cat: "STD"},
  {q: "Una valutazione 'online' in biometria si distingue dalla valutazione 'offline' perché:", opts: ["Usa solo dati sintetici generati da modelli generativi, non campioni biometrici reali", "Il sistema viene testato in tempo reale durante l'operatività, non su un corpus preregistrato", "Avviene esclusivamente su sistemi cloud senza hardware biometrico fisico dedicato", "Utilizza algoritmi di valutazione dinamica che si aggiornano a ogni nuovo campione acquisito"], ans: 1, expl: "Valutazione online: il sistema è testato in produzione, in tempo reale. Offline: si raccolgono campioni e si analizzano successivamente su corpus.", cat: "STD"},
  {q: "Lo standard ISO/IEC 19795-1 disciplina:", opts: ["I formati di interscambio dei dati biometrici (template, immagini, feature) tra sistemi diversi", "Le metodologie di test delle prestazioni dei sistemi biometrici", "I requisiti di sicurezza fisica per i sensori biometrici in ambienti non presidiati", "Le API standardizzate per l'integrazione di componenti biometrici eterogenei"], ans: 1, expl: "ISO/IEC 19795-1 = metodologie di test delle prestazioni. ISO/IEC 19794 = formati di interscambio. BioAPI = API. Distinzione importante.", cat: "STD"},
  {q: "Lo standard ISO/IEC 19794 definisce:", opts: ["I criteri e le metodologie di valutazione delle prestazioni (FMR, FNMR, EER) dei sistemi biometrici in laboratorio", "Le procedure operative di enrollment e la gestione del ciclo di vita completo dei template biometrici nei sistemi", "I formati di interscambio dei dati biometrici per garantire interoperabilità tra sistemi", "I requisiti di conformità GDPR e la protezione dei dati biometrici per i sistemi biometrici in ambito europeo"], ans: 2, expl: "ISO/IEC 19794: formati di interscambio (template di impronta, volto, iride, ecc.) per garantire interoperabilità tra vendor diversi.", cat: "STD"},
  {q: "Nel testing PAD (Presentation Attack Detection) secondo ISO/IEC 30107-3, il BPCER indica:", opts: ["La percentuale di attacchi di presentazione classificati erroneamente come campioni genuini", "Il tasso complessivo di attacchi rilevati con successo dal sistema PAD in condizioni operative", "La percentuale di soggetti genuini classificati erroneamente come attaccanti dal sistema PAD", "Il tasso di errore del sistema biometrico primario su campioni genuini non attaccati"], ans: 2, expl: "BPCER (Bona fide Presentation Classification Error Rate): soggetti genuini scambiati per attaccanti. APCER = attacchi classificati come genuini.", cat: "STD"},
  {q: "Lo standard BioAPI è un'architettura che:", opts: ["Regola la cifratura end-to-end e la protezione crittografica dei template durante la trasmissione su rete pubblica non sicura", "Definisce il formato binario standardizzato dei template biometrici per il loro scambio interoperabile tra sistemi eterogenei", "Stabilisce le metriche e le soglie di qualità minima dei campioni biometrici accettabili a livello internazionale per l'enrollment", "Specifica un set di primitive API per permettere l'integrazione di componenti biometrici eterogenei"], ans: 3, expl: "BioAPI: interfaccia applicativa standard che permette di integrare sensori e algoritmi biometrici di vendor diversi in modo modulare e interoperabile.", cat: "STD"},
  {q: "Lo standard CBEFF (NISTIR 6529-A) fornisce:", opts: ["Un protocollo di rete per la trasmissione sicura di dati biometrici tra sistemi distribuiti", "Un formato per incapsulare dati biometrici grezzi insieme ai metadati che li descrivono", "Una specifica crittografica per la cifratura reversibile dei template biometrici a chiave simmetrica", "Un algoritmo di compressione lossless specifico per template di impronta digitale multipla"], ans: 1, expl: "CBEFF (Common Biometric Exchange Formats Framework): struttura dati per incapsulare il biometrico grezzo insieme ai metadati (tipo tratto, formato, lunghezza, ecc.).", cat: "STD"},
  {q: "Lo score NFIQ (NIST Fingerprint Image Quality):", opts: ["Misura il numero totale di minutiae rilevate nell'immagine dell'impronta digitale su una scala normalizzata da 0 a 100", "Valuta la resistenza dell'impronta agli attacchi di presentazione con dita artificiali (gummy fingers) e materiali sintetici", "Classifica il tipo morfologico dell'impronta (arch, loop, whorl) per indirizzarla al bin AFIS corretto durante la ricerca", "Stima la qualità dell'immagine dell'impronta in relazione alle prestazioni attese del matcher"], ans: 3, expl: "NFIQ: stima predittiva della qualità dell'immagine dell'impronta correlata alle prestazioni del matcher. Non conta minutiae né classifica il tipo.", cat: "IMPR"},
  {q: "L'acquisizione contactless dell'impronta, rispetto a quella a contatto, introduce nuove sfide legate principalmente a:", opts: ["L'impossibilità di estrarre minutiae senza la pressione meccanica del dito sul sensore", "Problemi di illuminazione uniforme, prospettiva variabile e focus sul dito in aria", "L'incompatibilità totale dei template prodotti con qualsiasi sistema AFIS esistente", "La necessità di luce infrarossa lontana per penetrare sotto la superficie cutanea"], ans: 1, expl: "Contactless: senza il contatto fisico vengono meno vincoli di posizione → sfide di illuminazione non uniforme, angolazione variabile e messa a fuoco variabile.", cat: "IMPR"},
  {q: "I sistemi di impronta contactless 3D come IDEMIA MorphoWave utilizzano principalmente:", opts: ["Sensori capacitivi multichannel che rilevano la capacità a diverse profondità del tessuto", "Sensori ultrasonici che mappano la superficie papillare senza alcuna sorgente di luce", "Tecnologia FTIR proiettando luce NIR attraverso un prisma senza contatto col dito", "Luce strutturata o stereo multi-view per ricostruire la superficie 3D del dito in movimento"], ans: 3, expl: "MorphoWave e sistemi 3D simili usano luce strutturata o stereo multi-view per ricostruire la superficie 3D del dito durante il movimento (acquisizione on-the-fly).", cat: "IMPR"},
  {q: "Il formato JPEG2000 è preferito a JPEG classico per la compressione del volto nei passaporti biometrici principalmente perché:", opts: ["Non introduce mai artefatti di compressione anche a rapporti di compressione elevati", "È supportato nativamente da tutti i sistemi operativi mobili senza librerie aggiuntive", "Permette di cifrare il template biometrico insieme all'immagine in un singolo file standard", "Offre migliore qualità a parità di dimensione del file, con supporto a compressione lossless"], ans: 3, expl: "JPEG2000 vs JPEG classico: migliore qualità a parità di byte (importante per chip RFID con storage limitato) e supporto alla modalità lossless per applicazioni forensi.", cat: "VOLTO"},
  {q: "La dimensione tipica dell'immagine del volto memorizzata nel chip RFID dei passaporti biometrici è circa:", opts: ["200 kB, per garantire la massima qualità nelle verifiche automatiche di frontiera", "20 kB, secondo i requisiti ICAO per l'immagine JPEG2000 nei documenti di viaggio", "2 MB, per rispettare i requisiti di risoluzione ICAO per il riconoscimento facciale", "2 kB, per minimizzare i tempi di lettura del chip NFC ai controlli di frontiera automatici"], ans: 1, expl: "ICAO Doc 9303: immagine JPEG2000 del volto di circa 20 kB. Il chip RFID del passaporto ha capacità limitata (tipicamente 32-64 kB totali).", cat: "VOLTO"},
  {q: "I benchmark FRVT (Face Recognition Vendor Test) condotti dal NIST sono rilevanti perché:", opts: ["Certificano i sistemi commerciali di face recognition per uso governativo negli USA", "Valutano esclusivamente sistemi open-source per garantire riproducibilità dei risultati", "Definiscono la soglia minima di accuratezza accettabile per i sistemi biometrici governativi", "Mostrano lo stato dell'arte in rapida evoluzione e permettono il confronto comparativo tra vendor"], ans: 3, expl: "FRVT: benchmark NIST che permette confronto comparativo tra vendor su dataset comuni standardizzati, fotografando l'evoluzione dello stato dell'arte.", cat: "VOLTO"},
  {q: "Riguardo alla ricostruzione del volto a partire dal template biometrico (reversibilità), il corso indica che:", opts: ["Nei sistemi basati su deep learning è impossibile, ma nei sistemi PCA/Eigenfaces è fattibile", "È matematicamente impossibile: qualsiasi proiezione in spazio di feature è irreversibile per costruzione", "È stata dimostrata in letteratura come possibile, con implicazioni rilevanti per la privacy", "Non è tecnicamente rilevante perché i template sono sempre cifrati nei sistemi commerciali"], ans: 2, expl: "La letteratura ha dimostrato tecniche di ricostruzione parziale del volto dal template (anche da embedding neurali) → rilevante per la privacy.", cat: "VOLTO"},
  {q: "I sistemi di riconoscimento delle vene del palmo (palm vein) come Fujitsu PalmSecure operano in:", opts: ["Raggi X a bassa intensità per l'imaging dei vasi sanguigni senza contatto con la pelle", "Luce ultravioletta (UV) che eccita i pigmenti cutanei e rivela la struttura dei vasi", "Infrarosso vicino (NIR), poiché l'emoglobina deossigenata assorbe fortemente in questa banda", "Luce visibile bianca con sensore RGB standard ad alta risoluzione, sufficiente per rilevare la rete venosa superficiale"], ans: 2, expl: "NIR (~850 nm): l'emoglobina deossigenata assorbe la NIR → i vasi appaiono scuri sul palmo. Penetra la cute superficialmente senza raggi X.", cat: "TATTO"},
  {q: "L'attacco ai sistemi di vene del palmo dimostrato al Chaos Communication Congress 2018 si basava su:", opts: ["Un deepfake della mano generato con GAN a partire da immagini acquisite in luce visibile", "Un attacco di replay con un sample pre-registrato del palmo acquisito in condizioni di buio", "Un guanto in silicone che riproduce la struttura tridimensionale delle vene del palmo", "Una fotografia NIR delle vene del palmo del soggetto target, stampata su carta speciale"], ans: 3, expl: "CCC 2018: foto NIR del palmo → stampa su carta → lente a contatto umida sopra per la curvatura 3D. Attacco a basso costo che ha violato Fujitsu PalmSecure.", cat: "TATTO"},
  {q: "Uno dei principali driver di adozione dei sistemi biometrici touchless durante la pandemia COVID-19 è stato:", opts: ["L'obbligo normativo europeo di vietare i sistemi a contatto in ambienti pubblici affollati", "Il miglioramento dell'accuratezza del matcher grazie all'assenza di distorsioni elastiche", "La preoccupazione igienica per la condivisione della superficie del sensore tra utenti diversi", "La significativa riduzione dei costi hardware rispetto ai sistemi a contatto tradizionali"], ans: 2, expl: "COVID-19 ha accelerato l'adozione del touchless per igiene: il sensore condiviso era percepito come vettore di contagio.", cat: "TATTO"},
  {q: "Il riconoscimento perioculare (periocular recognition) utilizza la regione:", opts: ["Dell'intera faccia escludendo la zona della bocca e del mento per ridurre la variabilità", "Esclusivamente dell'iride e della pupilla acquisita ad alta risoluzione con luce NIR", "Intorno all'occhio (sopracciglia, palpebra, angoli oculari) escludendo l'iride stessa", "Del naso e degli zigomi come complemento al riconoscimento dell'iride standard"], ans: 2, expl: "Perioculare: regione attorno all'occhio (sopracciglia, palpebra superiore/inferiore, angoli oculari, canto). Complementare all'iride, utile quando l'iride è parzialmente occlusa.", cat: "TATTO"},
  {q: "Il sistema BioID che integra volto e iride in un singolo passo è un esempio di:", opts: ["Sistema di anti-spoofing che usa il volto per verificare la liveness prima del match dell'iride", "Sistema multimodale sequenziale che prima verifica il volto e poi l'iride separatamente", "Sistema di verifica esclusivamente basato sull'analisi dell'iride ad alta risoluzione", "Riconoscimento perioculare che sfrutta la regione attorno all'occhio in modo unificato"], ans: 3, expl: "BioID: acquisisce l'area perioculare in un unico frame, estraendo sia i tratti del volto che dell'iride simultaneamente → esempio di riconoscimento perioculare integrato.", cat: "TATTO"},
  {q: "Nella pipeline di tattoo recognition, il primo passo tipico è:", opts: ["Il matching diretto del tatuaggio con un database di pattern noti per l'identificazione", "La normalizzazione colorimetrica per uniformare lo stile e i colori del tatuaggio", "La detection e localizzazione del tatuaggio nell'immagine del corpo del soggetto", "L'estrazione delle minutiae dalla texture del tatuaggio per il confronto biometrico"], ans: 2, expl: "Prima si individua dove si trova il tatuaggio nel corpo (detection/localizzazione), poi si estrae il ROI, poi si normalizza e si fa il matching.", cat: "VOLTO"},
  {q: "La competizione SVC-onGoing sulla firma online è significativa perché:", opts: ["Valuta esclusivamente la robustezza agli attacchi adversarial sulla firma digitale online", "È l'unico benchmark internazionale che valuta esclusivamente la firma offline su carta", "Definisce gli standard ISO per i sistemi di autenticazione con firma in ambito bancario", "Fornisce una valutazione continua e aggiornata delle prestazioni dei sistemi di firma online"], ans: 3, expl: "SVC-onGoing: benchmark a valutazione continua (ongoing) su firma online, permette aggiornamento progressivo dei risultati man mano che emergono nuovi sistemi.", cat: "FIRMA"},
  {q: "I sistemi di autofirma (come Signascript) rappresentano un rischio per la sicurezza biometrica perché:", opts: ["Aumentano la variabilità intraclasse della firma, incrementando la FNMR del sistema", "Memorizzano il template della firma in formato non cifrato, esponendolo al furto", "Generano firme con dinamica artificiale che possono ingannare i matcher comportamentali", "Usano la firma dell'utente per accedere a sistemi biometrici con tratti diversi (iride, volto)"], ans: 2, expl: "Signascript simula la dinamica di firma (pressione, velocità, traiettoria) in modo programmabile: può generare firme false con caratteristiche comportamentali verosimili.", cat: "FIRMA"},
  {q: "Il GDPR e l'AI Act vietano l'inferenza di informazioni mediche dalla firma biometrica principalmente perché:", opts: ["La firma non è riconosciuta come tratto biometrico ai sensi del GDPR e non può essere usata per identificazione", "La dinamica della firma può rivelare condizioni neurologiche (Parkinson, tremori), che sono dati sanitari", "La firma non è un tratto universale né unico e non soddisfa le 7 proprietà del tratto biometrico", "L'AI Act classifica qualsiasi sistema di firma biometrica come ad alto rischio e ne vieta l'uso"], ans: 1, expl: "I parametri dinamici della firma (velocità, pressione, tremori) sono correlati a patologie neurologiche come il Parkinson → inferenza di dati sanitari vietata.", cat: "FIRMA"},
  {q: "I requisiti APACS per le applicazioni di firma in ambito bancario specificano:", opts: ["Che la firma deve essere acquisita con una tavoletta grafica certificata FIPS 140-2", "Che il template della firma deve essere cifrato con AES-256 e non trasmesso in rete", "I livelli minimi di accuratezza (FMR/FNMR) accettabili per l'autenticazione bancaria con firma", "Che la firma elettronica ha lo stesso valore legale della firma olografa in tutti i paesi UE"], ans: 2, expl: "APACS: definisce i livelli minimi di FMR e FNMR accettabili per autenticare transazioni bancarie tramite firma biometrica dinamica.", cat: "FIRMA"},
  {q: "Il pattern dei vasi sanguigni retinici come tratto biometrico è caratterizzato da:", opts: ["Elevata variabilità nel tempo per le fluttuazioni di pressione sanguigna e stati patologici", "Alta universalità ma bassa unicità, con strutture vascolari simili tra familiari stretti", "Unicità e stabilità elevate, con pattern che si forma precocemente e rimane costante nel tempo", "Variabilità stagionale significativa legata a cambiamenti nella vascolarizzazione retinica"], ans: 2, expl: "La retina ha unicità elevatissima (più dell'iride) e stabilità eccellente. Il pattern vascolare si forma durante lo sviluppo fetale e rimane stabile per tutta la vita.", cat: "RETINA"},
  {q: "I sistemi per l'acquisizione retinale utilizzano:", opts: ["Luce visibile a bassa intensità con un sensore RGB standard ad alta risoluzione", "Una telecamera stereoscopica per la ricostruzione 3D della distribuzione dei vasi retinici", "Un fascio di luce NIR a bassa potenza diretto sulla retina attraverso la pupilla dilatata", "Ultrasuoni a bassa frequenza per mappare la distribuzione dei vasi sanguigni nella retina"], ans: 2, expl: "Acquisizione retinica: fascio di luce NIR a bassa potenza passa attraverso la pupilla e illumina la retina → il sensore cattura il pattern vascolare riflesso.", cat: "RETINA"},
  {q: "Il principale svantaggio pratico del riconoscimento retinico rispetto ad altri tratti biometrici è:", opts: ["La scarsa stabilità del pattern retinico che richiede rienrollment periodico obbligatorio", "L'invasività e il disagio percepito dall'utente durante l'acquisizione ravvicinata dell'occhio", "La bassa unicità del tratto, che porta a frequenti falsi match anche in database piccoli", "L'impossibilità tecnica di acquisire il tratto senza contatto fisico con il dispositivo di scansione"], ans: 1, expl: "La retina richiede avvicinare l'occhio al dispositivo pochi centimetri: percepito come invasivo e igienicamente scomodo → bassa accettabilità utente.", cat: "RETINA"},
  {q: "La differenza tra speaker identification e speaker verification è che:", opts: ["La verifica è sempre text-dependent e richiede la pronuncia di una passphrase fissa, mentre l'identificazione è sempre text-independent", "L'identificazione usa esclusivamente MFCC come feature, mentre la verifica usa esclusivamente modelli neurali x-vector o ECAPA-TDNN", "L'identificazione risponde 'chi è?' (1:N) mentre la verifica risponde 'è chi dice di essere?' (1:1)", "L'identificazione opera solo su database chiusi (closed-set), mentre la verifica può operare sia in closed che in open-set"], ans: 2, expl: "Speaker identification = 1:N senza identity claim. Speaker verification = 1:1 con identity claim, risponde sì/no all'asserzione d'identità.", cat: "VOCE"},
  {q: "Un sistema di speaker recognition text-independent è preferibile quando:", opts: ["Si vuole massimizzare la sicurezza contro gli attacchi di replay su passphrase fissa, richiedendo variazione del testo", "L'utente pronuncia una passphrase fissa scelta durante la fase di enrollment e ripetuta a ogni autenticazione successiva", "Si dispone di pochi secondi di audio non strutturato e si vuole minimizzare il tasso di falso rifiuto del sistema", "Non si può controllare né richiedere un testo specifico all'utente durante l'uso del sistema"], ans: 3, expl: "Text-independent: funziona su qualsiasi testo parlato, ideale quando non si può imporre una frase specifica (call center, sorveglianza). Meno sicuro contro replay.", cat: "VOCE"},
  {q: "Gli MFCC (Mel-Frequency Cepstral Coefficients) nella speaker recognition modellano:", opts: ["La frequenza fondamentale (F0) del parlante per identificarne il timbro caratteristico", "La forma del tratto vocale del parlante attraverso l'inviluppo spettrale del segnale", "Esclusivamente le caratteristiche prosodiche (ritmo, intonazione, velocità) del parlante", "La potenza del segnale nel dominio temporale senza alcuna trasformazione spettrale"], ans: 1, expl: "Gli MFCC catturano l'inviluppo spettrale del segnale vocale, che riflette la forma del tratto vocale (laringe, faringe, bocca) → caratteristica discriminante del parlante.", cat: "VOCE"},
  {q: "Il Word Error Rate (WER) nella valutazione della speech recognition è calcolato come:", opts: ["(Numero di parole non riconosciute correttamente) / (Numero totale di parole pronunciate durante la sessione dal parlante)", "(Numero di parole errate nel riconoscimento) / (Numero totale di parole nel testo di riferimento trascritto)", "(Sostituzioni + Inserzioni + Cancellazioni) / (Numero totale di parole nel testo di riferimento)", "1 − (Numero di parole riconosciute correttamente) / (Numero totale di parole nel testo di riferimento annotato)"], ans: 2, expl: "WER = (S + I + D) / N dove S=sostituzioni, I=inserzioni, D=cancellazioni, N=parole nel riferimento. La D è quasi equivalente ma sbagliata: non conta le inserzioni.", cat: "VOCE"},
  {q: "Microsoft ha acquisito Nuance Communications nel 2022 per circa 19,7 miliardi di dollari principalmente per:", opts: ["Il database proprietario di impronte vocali per l'autenticazione nei servizi Azure", "I brevetti sui modelli di linguaggio (LLM) per potenziare Bing e i prodotti Microsoft 365", "Le tecnologie di speech e AI clinica per l'integrazione nell'ecosistema sanitario e produttivo", "Accedere alla tecnologia di riconoscimento biometrico dell'impronta per i dispositivi Surface"], ans: 2, expl: "Nuance: leader nel riconoscimento vocale per l'ambito sanitario (Dragon Medical, trascrizione clinica). Microsoft mirava all'AI clinica e alla trasformazione digitale healthcare.", cat: "VOCE"},
  {q: "Le competizioni NIST SRE (Speaker Recognition Evaluation) sono rilevanti perché:", opts: ["Certificano i sistemi commerciali di speaker recognition per uso governativo negli USA", "Forniscono benchmark comparativi tra sistemi diversi su dati comuni e condizioni realistiche", "Valutano esclusivamente sistemi open-source per garantire la riproducibilità dei risultati", "Definiscono gli standard ISO per i formati dei modelli di speaker recognition"], ans: 1, expl: "NIST SRE: benchmark comparativi su dati comuni (telefono, microfono, diverse lingue). Permettono confronto oggettivo tra team di ricerca e vendor commerciali.", cat: "VOCE"},
  {q: "Nella speaker recognition, aumentare la quantità di audio usato nell'enrollment tipicamente:", opts: ["Aumenta solo il FNMR perché il sistema diventa eccessivamente selettivo sull'utente genuino", "Non influenza le prestazioni del sistema se si usano modelli neurali come ECAPA-TDNN", "Degrada le prestazioni perché introduce maggiore variabilità intraclasse nel modello utente", "Sposta la curva DET verso prestazioni migliori, riducendo sia FMR che FNMR del sistema"], ans: 3, expl: "Più audio in enrollment → modello del parlante più robusto → migliore separazione genuini/impostori → tutta la curva DET migliora.", cat: "VOCE"},
  {q: "La PCR (Polymerase Chain Reaction) nell'analisi del DNA forense serve per:", opts: ["Separare i frammenti di DNA per lunghezza tramite elettroforesi capillare su gel per identificare i loci STR analizzati", "Determinare la sequenza completa del genoma individuale a partire da un singolo capello o campione cellulare prelevato", "Amplificare in modo esponenziale specifiche sequenze di DNA a partire da campioni molto piccoli", "Calcolare il likelihood ratio di corrispondenza tra due profili genetici STR per uso probatorio in ambito forense"], ans: 2, expl: "PCR: amplificazione esponenziale (milioni di copie) di sequenze specifiche → permette l'analisi anche da campioni minimi (pochi capelli, tracce biologiche).", cat: "DNA"},
  {q: "Il database CODIS dell'FBI usa profili basati su loci STR. Cosa sono gli STR?", opts: ["Varianti a singolo nucleotide (SNP) distribuite uniformemente nel genoma umano", "Frammenti mitocondriali del DNA usati per l'identificazione per linea materna", "Regioni del DNA che codificano per proteine specifiche usate nell'identificazione forense", "Sequenze non codificanti del DNA con numero variabile di ripetizioni tra individui diversi"], ans: 3, expl: "STR (Short Tandem Repeats): sequenze non codificanti con un motivo breve (2-7 bp) ripetuto un numero variabile di volte → altamente polimorfico tra individui.", cat: "DNA"},
  {q: "La fenotipizzazione del DNA (come quella offerta da Parabon o Face2Gene) permette di:", opts: ["Determinare l'identità esatta di un individuo da un campione anonimo con certezza assoluta tramite confronto con banche dati", "Ricostruire caratteristiche fisiche probabilistiche (colore occhi, capelli, etnia) da un profilo genetico", "Confrontare due profili STR per calcolare il likelihood ratio della corrispondenza e stabilirne l'identità comune", "Sequenziare l'intero genoma in pochi minuti a partire da tracce biologiche usando nanopore sequencing portatile"], ans: 1, expl: "Fenotipizzazione: stima probabilistica di caratteristiche fisiche osservabili (fenotipo) dal profilo genetico. Non identifica univocamente la persona, ma restringe la ricerca.", cat: "DNA"},
  {q: "Riguardo al DNA e ai gemelli omozigoti (monozigoti), quale affermazione è corretta?", opts: ["Il DNA nucleare è identico ma il DNA mitocondriale differisce e può essere usato per distinguerli", "Il DNA è identico ma le impronte digitali differiscono per effetti dello sviluppo in utero", "Il DNA è sempre identico, rendendo impossibile qualsiasi distinzione biometrica tra i due", "I profili STR sono identici, rendendo il DNA inutile, ma l'iride permette distinzione sempre certa"], ans: 1, expl: "Gemelli MZ: stesso DNA, stesse impronte? No — le impronte dipendono dall'ambiente uterino → differiscono. Il DNA forense non li distingue: limite noto.", cat: "DNA"},
  {q: "Il 'familial search' nei database DNA (come CODIS) è controverso perché:", opts: ["Viola le norme ISO sulle metodologie di test della biometria forense", "Richiede campioni di qualità superiore a quella normalmente disponibile nella scena del crimine", "Permette di identificare indirettamente parenti biologici di individui presenti nel database", "Non è tecnicamente possibile con i 20 loci STR usati nel profilo forense standard"], ans: 2, expl: "Familial search: se un profilo non coincide esattamente ma parzialmente, si può inferire un legame familiare → sorveglianza indiretta di persone non nel DB.", cat: "DNA"},
  {q: "Il Likelihood Ratio (LR) nel confronto di profili DNA esprime:", opts: ["Il valore percentuale di probabilità che due campioni appartengano allo stesso individuo", "Il numero di loci STR che devono coincidere perché due profili siano considerati identici", "Quanto è più probabile osservare la corrispondenza se il sospettato è la fonte rispetto al caso", "Il rapporto tra il numero di corrispondenze genuine e il numero di confronti impostori effettuati"], ans: 2, expl: "LR = P(evidenza | stessa fonte) / P(evidenza | fonte casuale). LR=1000 significa che la corrispondenza è 1000 volte più probabile se il sospettato è la fonte.", cat: "DNA"},
  {q: "Un vantaggio del riconoscimento dell'orecchio (ear recognition) rispetto al volto è che:", opts: ["Può essere acquisito con sensori standard senza alcuna calibrazione o preprocessing specifico per il tratto", "Offre un'accuratezza di matching nettamente superiore in qualsiasi condizione operativa rispetto al volto e all'iride", "La forma dell'orecchio è stabile rispetto alle espressioni facciali e meno soggetta all'invecchiamento", "È l'unico tratto biometrico che non richiede algoritmi di alignment prima del matching grazie alla simmetria anatomica"], ans: 2, expl: "L'orecchio non ha espressioni facciali variabili e invecchia più lentamente del volto → maggiore stabilità temporale. Utile in contesti laterali (sorveglianza da lato).", cat: "ORECCHIO"},
  {q: "HELIX è un SDK commerciale per il riconoscimento dell'orecchio che:", opts: ["Opera solo su database di orecchie già catalogate da agenzie forensi certificate", "Funziona esclusivamente su hardware dedicato con sensori 3D a luce strutturata laser", "Richiede sequenze video e non può operare su immagini statiche dell'orecchio", "Permette l'integrazione del riconoscimento dell'orecchio su diverse piattaforme software"], ans: 3, expl: "HELIX SDK: fornisce API per integrare ear recognition in applicazioni diverse, multipiattaforma, senza vincoli su specifico hardware o tipo di database.", cat: "ORECCHIO"},
  {q: "Le feature principali usate nel keystroke dynamics sono:", opts: ["La posizione assoluta dei tasti premuti sulla tastiera e la forza di pressione misurata da sensori capacitivi integrati", "La frequenza media di digitazione in WPM e il numero totale di errori di battitura per sessione di autenticazione", "La latenza tra coppie di tasti (digraph latency) e la durata di pressione di ogni tasto (dwell time)", "L'accelerazione del movimento delle dite e la traiettoria del polso rilevate da accelerometri integrati nella tastiera"], ans: 2, expl: "Keystroke dynamics: dwell time (quanto si tiene premuto un tasto) e digraph latency (tempo tra rilascio di un tasto e pressione del successivo) sono le feature cardine.", cat: "KEY"},
  {q: "Integrare il keystroke dynamics come secondo fattore nell'autenticazione aggiunge sicurezza perché:", opts: ["Rende l'autenticazione completamente passwordless, eliminando il rischio di phishing", "La digitazione della password stessa diventa un tratto biometrico comportamentale aggiuntivo", "Il sistema analizza la posizione geografica dell'utente durante la digitazione come contesto", "Il tasso di errore del matcher keystroke è inferiore a quello dell'impronta digitale in tutti i contesti"], ans: 1, expl: "Con keystroke come 2° fattore, digitare la password giusta non basta: anche il ritmo, la velocità e i tempi devono corrispondere al profilo dell'utente.", cat: "KEY"},
  {q: "L'attacco tramite keystroke timing su SSH sfrutta il fatto che:", opts: ["Il protocollo SSH v1 trasmette la password in chiaro durante la fase di autenticazione, esponendo le credenziali sulla rete", "Il server SSH non cifra i metadati di sessione, esponendo la struttura completa dei comandi digitati al monitoraggio passivo", "I pacchetti SSH di un singolo carattere rivelano il timing della digitazione, da cui si inferiscono i tasti", "I sistemi SSH non implementano padding dei pacchetti e ogni singolo byte trasmesso corrisponde esattamente a un tasto premuto"], ans: 2, expl: "SSH trasmette ogni carattere come pacchetto separato. L'analisi dei tempi tra i pacchetti rivela il timing di digitazione → possibile inferire i tasti digitati.", cat: "KEY"},
  {q: "L'opzione ObscureKeystrokeTiming introdotta in OpenSSH 9.5 mitiga gli attacchi di timing analysis:", opts: ["Comprimendo tutti i caratteri digitati in un unico pacchetto inviato al termine di ogni parola", "Autenticando il client con certificato digitale prima della trasmissione di qualsiasi carattere", "Cifrando il timing dei pacchetti con una chiave derivata dalla sessione SSH corrente", "Inviando pacchetti dummy con timing randomizzato per mascherare il pattern reale di digitazione"], ans: 3, expl: "ObscureKeystrokeTiming: aggiunge pacchetti fittizi con timing randomizzato → l'osservatore esterno non può distinguere il pattern reale dal rumore.", cat: "KEY"},
  {q: "TypingDNA è un prodotto commerciale che usa il keystroke dynamics principalmente per:", opts: ["Il monitoraggio comportamentale dei dipendenti per rilevare minacce interne in tempo reale", "La generazione di password sicure basate sullo stile di digitazione unico dell'utente", "L'autenticazione continua e il two-factor authentication tramite il pattern di digitazione", "Il rilevamento di bot e script automatici nelle transazioni bancarie e-commerce online"], ans: 2, expl: "TypingDNA: autenticazione 2FA e continua basata sul modo in cui l'utente digita. Integrato in siti web via JavaScript senza hardware aggiuntivo.", cat: "KEY"},
  {q: "Tra le domande fondamentali per la selezione del tratto biometrico in un nuovo sistema, quale è inclusa nel corso?", opts: ["Qual è il margine commerciale atteso dal vendor del sensore scelto per l'applicazione?", "L'ambiente di acquisizione è controllato o non controllato (cooperative vs uncooperative)?", "Il sistema sarà distribuito in un paese con una normativa biometrica già consolidata?", "Quanto pesa il template in memoria rispetto al costo del chip di storage scelto?"], ans: 1, expl: "L'ambiente controllato vs non controllato è una delle domande chiave: determina il tipo di sensore, le condizioni di illuminazione e l'interazione con l'utente.", cat: "PRIV"},
  {q: "Nella valutazione biometrica, un 'zero-effort impostor' è:", opts: ["Un sistema automatico che genera campioni sintetici ottimizzati per massimizzare la probabilità di ingannare il matcher", "Un soggetto che usa una copia artificiale del tratto biometrico (gummy finger, maschera) del soggetto target specifico", "Un soggetto che tenta di autenticarsi senza modificare in alcun modo il proprio tratto biometrico", "Un attaccante addestrato che imita attivamente e deliberatamente il tratto biometrico del soggetto target da ingannare"], ans: 2, expl: "Zero-effort impostor: tenta l'accesso usando il proprio tratto com'è, senza alcuno sforzo di mimicry. Serve per calcolare il FMR di base del sistema.", cat: "MET1"},
  {q: "Quale delle seguenti è una credenza errata (mito) sui sistemi biometrici secondo il corso?", opts: ["Alcune persone possono avere tratti biometrici di qualità insufficiente per l'enrollment", "Le prestazioni dei sistemi biometrici dipendono dalla qualità del sensore utilizzato", "I sistemi biometrici sono perfettamente sicuri e non possono essere ingannati in alcun modo", "I sistemi biometrici non sono infallibili e presentano tassi di errore non nulli"], ans: 2, expl: "Mito: 'i sistemi biometrici sono sicuri al 100%'. Realtà: tutti hanno FMR > 0, possono essere ingannati con attacchi di spoofing di vario livello.", cat: "PRIV"},
  {q: "I sistemi 'Biometrics as a Service' (BaaS) in cloud offrono rispetto ai sistemi on-premise:", opts: ["Garanzia di latenza inferiore a 1 ms grazie alla co-location geografica con l'utente finale", "Eliminazione completa del rischio di violazione dei dati biometrici degli utenti registrati", "Maggiore sicurezza per default perché i dati biometrici non lasciano mai il data center locale", "Scalabilità e aggiornamento automatico degli algoritmi senza gestione dell'hardware locale"], ans: 3, expl: "BaaS: elasticità cloud (scala on-demand), aggiornamenti automatici degli algoritmi senza gestione infrastrutturale. Contro: i dati lasciano il perimetro.", cat: "PRIV"},
  {q: "In fase di progettazione, i livelli target di FMR e FNMR da raggiungere:", opts: ["Sono identici per qualsiasi tipo di applicazione biometrica, definiti e fissati univocamente dallo standard ISO/IEC 19794", "Dipendono esclusivamente dalla tecnologia e dalla qualità del sensore scelto, indipendentemente dal tipo di applicazione", "Dipendono dall'applicazione (autenticazione, identificazione, screening) e dal profilo di rischio", "Vengono determinati empiricamente solo durante il deployment operativo e non possono essere fissati in fase di progettazione"], ans: 2, expl: "I target FMR/FNMR variano enormemente: accesso fisico (FMR 10⁻⁵), smartphone unlock (FMR 10⁻³), screening aeroportuale (FNMR prioritario). Dipendono dal rischio.", cat: "PRIV"},
  {q: "La fusione a livello di sample (raw data fusion) nei sistemi multimodali consiste in:", opts: ["Votare la decisione finale tra più classificatori biometrici indipendenti applicando la regola di majority vote ponderata", "Combinare i feature vector estratti da tratti diversi in un vettore concatenato prima del matching biometrico finale", "Combinare i matching score di più moduli biometrici applicando una regola di fusione parametrica come la sum rule normalizzata", "Combinare i campioni grezzi (immagini, segnali) di tratti diversi prima dell'estrazione delle feature"], ans: 3, expl: "Raw data (sample) fusion: si fondono direttamente i segnali grezzi (es. immagini multispettrali, fusione termica+visibile). Livello più basso nella gerarchia di fusione.", cat: "MULTI"},
  {q: "Nella fusione a livello di matching score, la 'sum rule' combina i punteggi di moduli diversi:", opts: ["Confrontando ogni score con la propria soglia individuale e sommando le decisioni binarie", "Normalizzando ogni score sul proprio range storico e poi prendendo il valore minimo", "Sommando i matching score dei moduli, spesso pesati in base all'affidabilità di ciascun tratto", "Prendendo il valore massimo tra tutti i matching score disponibili per la decisione finale"], ans: 2, expl: "Sum rule: Σ(wi × si) dove wi è il peso del modulo i e si il suo score normalizzato. Robusta e generalmente efficace rispetto a regole più complesse.", cat: "MULTI"},
  {q: "La normalizzazione min-max degli score di matching porta tutti i valori nell'intervallo [0,1] ma ha come svantaggio principale:", opts: ["Non è applicabile ai sistemi di verifica 1:1 ma solo ai sistemi di identificazione 1:N", "Trasforma la distribuzione degli score in modo non monotono, alterando il ranking", "Richiede conoscenza preventiva di tutti gli score futuri, rendendola inapplicabile online", "È sensibile agli outlier (valori estremi) che possono comprimere eccessivamente il range utile"], ans: 3, expl: "Min-max: (x - min) / (max - min). Un outlier molto alto comprime tutti gli altri valori vicini a zero → perde risoluzione nella zona di interesse.", cat: "MULTI"},
  {q: "Secondo il corso, quale combinazione di tratti è storicamente la più usata nei sistemi multimodali?", opts: ["Impronta digitale + iride", "Iride + geometria della mano", "Impronta digitale + volto", "Volto + voce"], ans: 3, expl: "Volto + voce: combinazione più diffusa storicamente, entrambi acquisibili a distanza e senza contatto. Usata ad es. nei sistemi telefonici con verifica video.", cat: "MULTI"},
  {q: "L'Innocence Project ha dimostrato che la principale causa di condanne errate negli USA è:", opts: ["La falsificazione di prove del DNA da parte di laboratori forensi non accreditati, documentata in oltre il 30% dei casi", "L'uso di sistemi biometrici automatici con FMR elevato come prove processuali, ammesso senza verifica indipendente", "Le confessioni ottenute sotto coercizione psicologica durante gli interrogatori, ritenute valide senza corroborazione", "La falsa testimonianza oculare (eyewitness misidentification) in oltre il 60% dei casi analizzati"], ans: 3, expl: "Innocence Project: analisi di condanne poi annullate grazie al DNA → oltre il 60% dei casi aveva testimonianze oculari false come causa principale.", cat: "VOLTO"},
  {q: "Il 'show-up' nell'identificazione visiva in ambito giudiziario differisce dal 'line-up' perché:", opts: ["Nel show-up il testimone vede il sospettato insieme ad altri soggetti innocenti in sequenza", "Nel show-up il testimone viene confrontato con un solo sospettato in isolamento", "Nel show-up si usa un sistema biometrico automatico anziché il riconoscimento visivo diretto", "Nel show-up il testimone è confrontato con l'intera gallery di sospettati simultaneamente"], ans: 1, expl: "Show-up: un solo sospettato mostrato isolatamente → altamente suggestivo. Line-up: sospettato tra diversi foil → meno suggestivo, più difendibile in aula.", cat: "VOLTO"},
  {q: "L'esperimento Heureka (1325 partecipanti, 48 condizioni) ha costruito la curva ROC dell'identificazione visiva umana per:", opts: ["Confrontare l'accuratezza degli algoritmi automatici di face recognition con quella umana", "Valutare la capacità degli esseri umani di individuare i deepfake al variare delle condizioni", "Analizzare le condizioni operative ottimali per massimizzare le prestazioni dei sistemi AFIS", "Misurare le prestazioni di riconoscimento umano al variare delle condizioni sperimentali"], ans: 3, expl: "Heureka: ha prodotto la curva ROC del riconoscimento facciale umano su 48 condizioni diverse, mostrando come variabilità di illuminazione, angolo, risoluzione impattino le performance.", cat: "VOLTO"},
  {q: "L'omogenizzazione degli score nei sistemi multimodali è necessaria perché:", opts: ["Tutti i matcher biometrici producono score in formato floating point a 64 bit per default", "I matcher diversi possono produrre score di natura diversa (distanza vs similitudine) e range diversi"], ans: 1, expl: "Un matcher può produrre una distanza (0=identici, valori alti=diversi), un altro una similitudine (1=identici). Sommarli senza omogenizzare darebbe risultati senza senso.", cat: "MULTI"},
  {q: "Il principale svantaggio delle autofacce (eigenfaces) come tecnica di riconoscimento del volto è che:", opts: ["Richiedono sensori con risoluzione superiore a 1000 dpi e calibrazione geometrica millimetrica per funzionare correttamente", "Non utilizzano l'informazione di classe e soffrono di variazioni di illuminazione, allineamento e posa del soggetto", "Non possono essere calcolate per dataset con più di 100 individui a causa del costo computazionale cubico proibitivo", "Sono incompatibili con qualsiasi formato di interscambio biometrico standard come ISO/IEC 19794 tra sistemi eterogenei"], ans: 1, expl: "La PCA è non supervisionata: non usa le etichette. Le direzioni di massima varianza non coincidono con quelle più discriminanti → LDA risolve questo problema.", cat: "VOLTO"},
  {q: "La Linear Discriminant Analysis (LDA) applicata ai volti, rispetto alla PCA, ha come obiettivo di:", opts: ["Ignorare le etichette degli individui e cercare le componenti con maggiore varianza globale nel dataset di training", "Proiettare i vettori senza ridurre la dimensionalità, mantenendo tutte le feature originali invariate nel risultato", "Massimizzare il rapporto tra la varianza inter-classe (between-class) e la varianza intra-classe (within-class)", "Minimizzare la distanza euclidea tra tutti i volti indipendentemente dalla classe di appartenenza di ciascuno"], ans: 2, expl: "LDA: massimizza la separazione between-class minimizzando la dispersione within-class → più discriminante della PCA per il riconoscimento.", cat: "VOLTO"},
  {q: "Nella face detection color-based, la sequenza corretta dei passi è:", opts: ["Skin Tone Detection → Lighting Compensation → Localization of Facial Features → Aggregazione dei risultati finali", "Aggregazione → Lighting Compensation → Localization of Facial Features → Skin Tone Detection sull'immagine finale", "Localization of Facial Features → Skin Tone Detection → Lighting Compensation → Aggregazione dei risultati", "Lighting Compensation → Skin Tone Detection → Localization of Facial Features → Aggregazione dei risultati"], ans: 3, expl: "Prima si compensa l'illuminazione (Lighting Compensation), poi si rileva la pelle (Skin Tone), poi si localizzano le feature facciali, infine si aggregano i risultati.", cat: "VOLTO"},
  {q: "Le feature basate sulle funzioni di Haar nella face detection individuano i volti cercando:", opts: ["Le frequenze spaziali dominanti nelle bande NIR dell'immagine acquisita con sensore monocromatico calibrato", "Regioni che presentano particolari valori di differenze fra i toni di grigio di 2 o 3 zone adiacenti dell'immagine", "La posizione dei punti fiduciali come naso e bocca tramite template matching geometrico su immagine binarizzata", "Le componenti principali della texture calcolate con PCA su porzioni locali dell'immagine in scala di grigi"], ans: 1, expl: "Le Haar feature calcolano differenze di intensità tra regioni adiacenti rettangolari. Il classificatore Viola-Jones usa queste feature con Integral Image per rilevare volti in tempo reale.", cat: "VOLTO"},
  {q: "Il face tracking in un video si differenzia dalla face detection su singoli frame perché:", opts: ["Non richiede alcun algoritmo di detection poiché il volto viene localizzato una sola volta al primo frame della sequenza", "Utilizza esclusivamente sensori 3D a luce strutturata per seguire tridimensionalmente il volto nella scena ripresa", "Applica la skin tone detection a ogni frame indipendentemente dal risultato dei frame precedenti della sequenza video", "Si basa su modelli di aspettativa temporale: il volto non può essersi spostato di molto tra frame consecutivi"], ans: 3, expl: "Il tracking sfrutta la continuità temporale: sapendo dov'era il volto al frame t, si restringe la ricerca al frame t+1. Più efficiente della detection indipendente per ogni frame.", cat: "VOLTO"},
  {q: "La tecnica di acquisizione 3D mediante luce strutturata (coded light) funziona:", opts: ["Proiettando in successione temporale pattern binari con bande progressivamente più fini e ricostruendo la 3D dalla deformazione", "Emettendo impulsi laser e misurando il tempo di ritorno della luce riflessa per ogni singolo punto della scena ripresa", "Acquisendo due immagini stereo con telecamere calibrate e calcolando la disparità tra i pixel corrispondenti nelle due viste", "Illuminando il soggetto con luce NIR uniforme e analizzando le variazioni di intensità riflessa sulla superficie cutanea"], ans: 0, expl: "Coded light: proietta sequenze di pattern binari sempre più fini (codice Gray). La deformazione dei pattern sulla superficie ricostruisce la profondità punto per punto.", cat: "VOLTO"},
  {q: "Apple FaceID utilizza quale tecnologia per l'acquisizione 3D del volto?", opts: ["LiDAR impulsato che misura il tempo di volo diretto di impulsi laser infrarossi per ogni punto del volto rilevato", "Stereovisione passiva con due telecamere RGB distanziate di 65 mm per triangolazione geometrica della superficie", "Sensore ToF modulato in fase che misura la distanza tramite lo sfasamento della luce modulata emessa dal dispositivo", "Luce strutturata a infrarossi che proietta circa 30.000 punti per ricostruire la mappa 3D del volto dell'utente"], ans: 3, expl: "FaceID usa un proiettore a punti IR (dot projector) che proietta ~30.000 punti invisibili sul volto. Una camera IR acquisisce il pattern deformato e ricostruisce la mappa 3D.", cat: "VOLTO"},
  {q: "I principali vantaggi dei sistemi biometrici 3D per il volto rispetto al 2D includono:", opts: ["Costo inferiore dei sensori 3D rispetto ai 2D, maggiore velocità di matching e compatibilità con i formati ICAO", "Invarianza alla luce ambiente, tolleranza a piccoli spostamenti angolari del volto e capacità di distinguere gemelli omozigoti", "Maggiore accettabilità da parte dell'utente, possibilità di acquisizione non consenziente e immunità completa allo spoofing", "Utilizzabilità con qualsiasi webcam standard, resistenza totale alle occlusioni facciali e assenza di calibrazione necessaria"], ans: 1, expl: "I sistemi 3D sono invarianti all'illuminazione, tollerano variazioni di posa e sono più efficaci nel distinguere gemelli o sosia rispetto al 2D.", cat: "VOLTO"},
  {q: "L'attacco Hill Climbing nel face recognition consiste nel:", opts: ["Rubare la chiave crittografica del canale di comunicazione tra sensore e server di matching del sistema biometrico attaccato", "Inoculare campioni fraudolenti nel training set di una rete neurale per alterare permanentemente il comportamento del modello", "Intercettare il template biometrico dal database e decrittarlo applicando tecniche di forza bruta sulla chiave simmetrica usata", "Partire da un sample casuale e modificarlo iterativamente per incrementare il match score fino a superare la soglia"], ans: 3, expl: "Hill Climbing: se il sistema restituisce lo score, l'attaccante modifica iterativamente il sample seguendo l'aumento dello score fino a superare la soglia di accettazione.", cat: "ATK"},
  {q: "L'anti-spoofing facciale basato sull'analisi del flusso ottico tra frame consecutivi permette di rilevare:", opts: ["Discontinuità nei movimenti coerenti con bordi di maschera con fori per gli occhi o bordi di uno schermo usato per l'attacco", "La temperatura corporea del soggetto e la presenza di pelle artificiale in silicone o gomma termicamente isolante rilevata", "La distribuzione della melanina nel derma profondo tramite illuminazione multispettrale NIR a banda stretta calibrata fine", "Il battito cardiaco remoto (rPPG) analizzando le micro-variazioni cromatiche del viso in tutta la banda visibile integrata"], ans: 0, expl: "Il flusso ottico rivela discontinuità: i bordi di maschera o schermo creano pattern di movimento incoerenti con un volto reale che si muove uniformemente.", cat: "ATK"},
  {q: "La tecnica di anti-spoofing facciale basata su Near Infrared (NIR) sfrutta il fatto che:", opts: ["I display e le superfici stampate in luce visibile diventano inutilizzabili per attacchi con camere NIR", "La luce NIR penetra fino a 5 cm nel tessuto sottocutaneo rivelando la struttura ossea completa del cranio del soggetto", "I sensori NIR sono immuni a qualsiasi tipo di illuminazione ambientale e operano anche in condizioni di buio totale", "Le maschere in silicone riflettono la luce NIR in modo identico alla pelle umana facilitando sempre il riconoscimento"], ans: 0, expl: "In NIR, gli schermi appaiono molto luminosi e le stampe su carta hanno riflettività diversa dalla pelle → attacchi 2D con foto o video diventano facilmente rilevabili.", cat: "ATK"},
